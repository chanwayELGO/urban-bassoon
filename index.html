        {/* Invalid flight number */}
        {bookingResult?.type==="flight_invalid"&&(
          <div style={{marginTop:10,fontSize:13,color:"rgba(255,92,92,0.8)",padding:"8px 12px",
            background:"rgba(255,92,92,0.07)",border:"1px solid rgba(255,92,92,0.2)",borderRadius:10}}>
            ⚠️ "{bookingResult.raw}" doesn't look like a flight number. Try formats like SQ321, BA117, AA1234.
          </div>
        )}

        {/* ── Hotel / booking result ── */}
        {bookingResult?.type==="hotel"&&(
          <div className="booking-result">
            <div style={{marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:13,fontWeight:600}}>Ref: <span style={{fontFamily:"monospace",color:"#9B9BFF"}}>{bookingResult.raw}</span></div>
              {bookingResult.platform!=="generic"&&(
                <div className="booking-platform-badge">
                  {bookingResult.platform==="airbnb"?"🏠 Airbnb":
                   bookingResult.platform==="booking"?"🏨 Booking.com":
                   bookingResult.platform==="expedia"?"✈️ Expedia":
                   bookingResult.platform==="pnr"?"✈️ PNR":"🏨 Hotel"}
                </div>
              )}
            </div>
            <div className="booking-links-grid">
              {bookingResult.links.map((l,i)=>(
                <a key={i} href={l.url} target="_blank" rel="noopener noreferrer"
                  className="booking-link-btn">
                  <div className="blb-icon">{l.icon}</div>
                  <div><div className="blb-label">{l.label}</div><div className="blb-sub">{l.sub}</div></div>
                </a>
              ))}
            </div>
            <button className="btn-ghost" style={{width:"100%",marginTop:10,fontSize:12}}
              onClick={()=>setShowSaveForm(s=>!s)}>
              {showSaveForm?"Cancel":"📌 Save this booking"}
            </button>
          </div>
        )}

        {/* Save form */}
        {showSaveForm&&(
          <div className="save-form">
            <input className="input" placeholder='Label e.g. "Return flight" or "Hotel Tokyo"'
              value={saveLabel} onChange={e=>setSaveLabel(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addBookmark()}/>
            <button className="btn btn-full" onClick={addBookmark}
              disabled={!saveLabel.trim()}>Save Bookmark</button>
          </div>
        )}

        {/* Saved bookings */}
        {savedBookings.length>0&&(
          <div className="saved-bookings">
            <div className="saved-bookings-hdr">
              <div style={{fontSize:12,color:"var(--text-dim)",fontWeight:600,textTransform:"uppercase",letterSpacing:".6px"}}>
                📌 Saved ({savedBookings.length})
              </div>
            </div>
            {savedBookings.map(b=>(
              <div key={b.id} className="saved-bookmark">
                <div className="saved-bm-icon">{b.type==="flight"?"✈️":"🏨"}</div>
                <div style={{flex:1,minWidth:0}} onClick={()=>loadBookmark(b)}>
                  <div className="saved-bm-label">{b.label}</div>
                  <div className="saved-bm-ref">{b.ref}</div>
                </div>
                <button className="btn-del" style={{fontSize:13}} onClick={()=>removeBookmark(b.id)}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ── Local Discovery Feed ── */}
      {(()=>{
        const tc = timeClass();
        const isLoading = disc.step==="locating"||disc.step==="generating";
        return (
          <div className={`discovery-card ${tc}`}>
            <div className="discovery-hdr">
              <div className="discovery-title-block">
                <div className="discovery-eyebrow">
                  {disc.step==="locating"?"Finding you…"
                   :disc.step==="generating"?"Asking Claude…"
                   :disc.step==="ready"?`📍 ${disc.location||"Nearby"}`
                   :"📍 What's nearby"}
                </div>
                <div className="discovery-heading">
                  {disc.step==="ready"
                    ? disc.headline||"Nearby right now"
                    : `${timeOfDayLabel().charAt(0).toUpperCase()+timeOfDayLabel().slice(1)} discoveries`}
                </div>
                {disc.step==="ready"&&disc.generatedAt&&(
                  <div className="discovery-sub">Updated {disc.generatedAt}</div>
                )}
              </div>
              <button className="discovery-refresh-btn"
                disabled={isLoading}
                onClick={()=>fetchDiscovery(disc.step==="ready")}>
                {isLoading
                  ? <span className="dots"><span>·</span><span>·</span><span>·</span></span>
                  : disc.step==="ready" ? "↺ Refresh" : "✨ Discover"}
              </button>
            </div>

            {/* Idle — prompt to discover */}
            {disc.step==="idle"&&(
              <div className="disc-locate-btn" onClick={()=>fetchDiscovery(false)}>
                <span style={{fontSize:22}}>🔍</span>
                <div>
                  <div style={{fontWeight:600,color:"var(--text)"}}>Discover what's nearby</div>
                  <div style={{fontSize:11,marginTop:2}}>Claude suggests 3 things based on your location, time &amp; itinerary</div>
                </div>
              </div>
            )}

            {/* Loading shimmer */}
            {isLoading&&(
              <div>
                {[0,1,2].map(i=>(
                  <div key={i} className="disc-shimmer-item">
                    <div style={{width:44,height:44,borderRadius:12,flexShrink:0,
                      background:"rgba(255,255,255,0.04)",animation:"shimmer 1.4s infinite",
                      backgroundSize:"200% 100%",
                      backgroundImage:"linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,200,100,0.07) 50%,rgba(255,255,255,0.04) 75%)"}}/>
                    <div style={{flex:1,display:"flex",flexDirection:"column",gap:7}}>
                      {[70,50,85].map((w,j)=>(
                        <div key={j} style={{height:10,borderRadius:5,width:`${w}%`,
                          background:"rgba(255,255,255,0.05)",animation:"shimmer 1.4s infinite",
                          backgroundSize:"200% 100%",animationDelay:`${j*0.15}s`,
                          backgroundImage:"linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,200,100,0.07) 50%,rgba(255,255,255,0.04) 75%)"}}/>
                      ))}
                    </div>
                  </div>
                ))}
                <div style={{textAlign:"center",fontSize:11,color:"var(--text-dim)",marginTop:8,paddingTop:8,
                  borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                  {disc.step==="locating"?"Getting your location…":"Claude is curating suggestions…"}
                </div>
              </div>
            )}

            {/* Error */}
            {disc.step==="error"&&(
              <div>
                <div style={{fontSize:13,color:"rgba(255,92,92,0.8)",padding:"10px 12px",
                  background:"rgba(255,92,92,0.07)",border:"1px solid rgba(255,92,92,0.2)",
                  borderRadius:10,marginBottom:10}}>
                  ⚠️ {disc.errorMsg||"Could not get suggestions"}
                </div>
                <button className="btn-ghost" style={{width:"100%",fontSize:12}} onClick={()=>fetchDiscovery(true)}>
                  Try again
                </button>
              </div>
            )}

            {/* Results */}
            {disc.step==="ready"&&disc.items.map((item,i)=>(
              <div key={i} className="disc-item">
                <div className={`disc-emoji-tile ${tileClass(item.type)}`}>{item.emoji||"📍"}</div>
                <div className="disc-body">
                  <div className="disc-title-row">
                    <div className="disc-name">{item.name}</div>
                    {item.type&&(
                      <div className={`disc-type-badge ${badgeClass(item.type)}`}>{item.type}</div>
                    )}
                  </div>
                  {item.why&&<div className="disc-why">{item.why}</div>}
                  {item.tip&&<div className="disc-tip">💡 {item.tip}</div>}
                  <a className="disc-maps-btn"
                    href={mapsUrl(item.google_maps_query, disc.location)}
                    target="_blank" rel="noopener noreferrer">
                    📍 Find on Maps
                  </a>
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* Currency Converter */}
      <div className="card">
        <div className="card-title">💱 Currency Converter</div>
        <div className="flex gap-8">
          <select className="input flex-1" value={currFrom} onChange={e=>setCurrFrom(e.target.value)}>
            {CURRENCIES.map(c=><option key={c}>{c}</option>)}
          </select>
          <div style={{fontSize:20,display:"flex",alignItems:"center",color:"rgba(230,217,194,0.3)",flexShrink:0}}>⇌</div>
          <select className="input flex-1" value={currTo} onChange={e=>setCurrTo(e.target.value)}>
            {CURRENCIES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="flex gap-8 mt-8">
          <input className="input flex-1" type="number" placeholder="Amount" value={currAmount} onChange={e=>setCurrAmount(e.target.value)} />
          <button className="btn" onClick={convertCurrency}>Convert</button>
        </div>
        {currResult!==null&&(
          <div style={{textAlign:"center",marginTop:14,fontFamily:"'Playfair Display',serif"}}>
            <span style={{fontSize:13,color:"rgba(230,217,194,0.45)"}}>{currAmount} {currFrom} =</span>
            <div style={{fontSize:30,color:"var(--amber)",fontWeight:700}}>{typeof currResult==="number"?currResult.toFixed(2):currResult} {currTo}</div>
          </div>
        )}
      </div>

      {/* AI Assistant */}
      <div className="card">
        <div className="card-title">🤖 AI Travel Assistant</div>
        <textarea className="input" placeholder={`Ask anything about ${trip.destination||"your destination"}…\ne.g. "Best street food in Bangkok" or "Tips for first-time solo traveller"`}
          value={aiQuery} onChange={e=>setAiQuery(e.target.value)} />
        <button className="btn btn-full mt-8" onClick={getAiTip} disabled={aiLoading}>
          {aiLoading?<span className="dots"><span>·</span><span>·</span><span>·</span></span>:"✨ Ask AI"}
        </button>
        {aiResponse&&<div className="ai-box">{aiResponse}</div>}
      </div>

      {/* Phrases */}
      <div className="card">
        <div className="card-title">💬 Useful Phrases</div>
        <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:10}}>Common translations (ZH / FR / ES / JA)</div>
        {PHRASES.map((p,i)=>(
          <div key={i} className="phrase-row">
            <div className="phrase-en">{p.en}</div>
            <div className="phrase-tr">{p.tr}</div>
          </div>
        ))}
      </div>

      {/* Emergency */}
      <div className="card">
        <div className="card-title">🚨 Emergency Numbers</div>
        <div className="grid-2">
          {EMERGENCY.map(e=>(
            <div key={e.c} className="emg-card">
              <div className="emg-country">{e.c}</div>
              <div className="emg-nums">👮 {e.p} &nbsp; 🚑 {e.a}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── MEMORIES Tab ─────────────────────────────────────────────────────────── */
function MemoriesTab({ memories, addMemory, updateMemory, deleteMemory, trip, quickMemoryCtx, clearQuickMemory }) {
  const mapRef = useRef(null);
  const leafletMap = useRef(null);

  // Pre-fill form from quick-memory context (tapped 📸 on an activity)
  useEffect(()=>{
    if(!quickMemoryCtx) return;
    const {act,day}=quickMemoryCtx;
    setForm(f=>({...f,title:act.text,date:new Date().toISOString().split("T")[0],notes:`${day.label} · ${act.text}`}));
    if(clearQuickMemory) clearQuickMemory();
  },[quickMemoryCtx]);
  const markersRef = useRef({});
  const pendingMarkerRef = useRef(null);

  const [pinForm, setPinForm]   = useState(null);
  const [form, setForm]         = useState({ title:"", date:new Date().toISOString().split("T")[0], mood:"😍", notes:"", photo:null, locationName:"" });
  const MOODS = ["😍","😄","😊","🥹","🤩","😎","😌","🥰","😮","😴","🥶","🌧️"];

  // AI states
  const [genLoading, setGenLoading]       = useState(false);   // generate-in-form
  const [genSuggestion, setGenSuggestion] = useState(null);    // {notes, mood, title}
  const [enhancing, setEnhancing]         = useState({});      // {[id]: {loading, result}}
  const [story, setStory]                 = useState({loading:false, text:""});
  const [showStory, setShowStory]         = useState(false);

  // ── Claude helper ──────────────────────────────────────────────────────────
  const callClaude = async (system, userMsg, maxTokens=600) => {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system, messages:[{role:"user",content:userMsg}] }),
    });
    const d = await res.json();
    return d.content?.[0]?.text || "";
  };

  // ── 1. Generate memory note from location + mood ──────────────────────────
  const generateMemoryNote = async () => {
    const place = form.title || form.locationName;
    if (!place) return;
    setGenLoading(true);
    setGenSuggestion(null);
    try {
      const raw = await callClaude(
        `You are a travel journal writer. Return ONLY valid JSON, no markdown.
Shape: {"title":"catchy place title (max 6 words)","mood":"single emoji that fits","notes":"vivid 2–3 sentence journal entry written in first person, present tense, sensory detail"}
Rules: notes must be immersive, specific to the place, and evocative. Do not start with "I". No generic phrases.`,
        `Place: ${place}
Location: ${form.locationName || "unknown"}
Date: ${form.date}
Current mood emoji: ${form.mood}
Trip destination: ${trip.destination || "unknown"}
User's rough notes (may be empty): ${form.notes}
Generate a rich memory entry.`
      );
      const cleaned = raw.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(cleaned);
      setGenSuggestion(parsed);
    } catch { setGenSuggestion({notes:"Could not generate — check your connection.", mood:form.mood, title:form.title}); }
    setGenLoading(false);
  };

  const acceptSuggestion = () => {
    if (!genSuggestion) return;
    setForm(f=>({ ...f,
      title: genSuggestion.title || f.title,
      mood:  genSuggestion.mood  || f.mood,
      notes: genSuggestion.notes || f.notes,
    }));
    setGenSuggestion(null);
  };

  // ── 2. Enhance an existing memory card ────────────────────────────────────
  const enhanceMemory = async (mem) => {
    setEnhancing(p=>({...p,[mem.id]:{loading:true,result:null}}));
    try {
      const enhanced = await callClaude(
        `You are a gifted travel writer. Take the raw memory details and write a beautiful, vivid journal entry (3–5 sentences, first person). Be poetic but grounded in the specific place. Do NOT add fictional facts. Return ONLY the journal text — no headings, no JSON.`,
        `Place: ${mem.title}
Location: ${mem.locationName}
Date: ${mem.date}
Mood: ${mem.mood}
Original notes: ${mem.notes || "(none — write from place knowledge)"}

Write an enhanced journal entry for this memory.`
      , 400);
      setEnhancing(p=>({...p,[mem.id]:{loading:false,result:enhanced.trim()}}));
    } catch { setEnhancing(p=>({...p,[mem.id]:{loading:false,result:"⚠️ Could not enhance. Try again."}})); }
  };

  const acceptEnhancement = (mem) => {
    const enhanced = enhancing[mem.id]?.result;
    if (!enhanced) return;
    updateMemory({...mem, notes: enhanced});
    setEnhancing(p=>({...p,[mem.id]:{loading:false,result:null}}));
  };

  const dismissEnhancement = (id) => setEnhancing(p=>({...p,[id]:{loading:false,result:null}}));

  // ── 3. Weave all memories into a travel story ─────────────────────────────
  const generateStory = async () => {
    if (memories.length < 2) return;
    setStory({loading:true, text:""});
    setShowStory(true);
    try {
      const memSummaries = [...memories].sort((a,b)=>a.date.localeCompare(b.date))
        .map(m=>`• ${m.date} | ${m.mood} ${m.title} @ ${m.locationName||"unknown location"}: ${m.notes||"(no notes)"}`)
        .join("\n");
      const text = await callClaude(
        `You are a travel memoirist. Given a traveller's pinned memories, weave them into a cohesive, beautifully written travel story in first person. Use narrative prose — no bullet points or headers. Include sensory detail, emotion, and a sense of journey. 300–450 words.`,
        `Trip: ${trip.name||"My Trip"}${trip.destination?" to "+trip.destination:""}
Memories (chronological):
${memSummaries}

Write the travel story.`
      , 800);
      setStory({loading:false, text:text.trim()});
    } catch { setStory({loading:false, text:"⚠️ Could not generate story. Check your connection and try again."}); }
  };

  // ── Map init ───────────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!mapRef.current || leafletMap.current) return;
    const L = window.L;
    const map = L.map(mapRef.current, { zoomControl:true, attributionControl:false });
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", { maxZoom:19 }).addTo(map);
    map.setView([20, 0], 2);
    leafletMap.current = map;
    map.on("click", (e)=>{
      const {lat,lng} = e.latlng;
      if(pendingMarkerRef.current){ pendingMarkerRef.current.remove(); pendingMarkerRef.current=null; }
      const pIcon = L.divIcon({ className:"", html:`<div style="width:22px;height:22px;background:#FFA828;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(255,168,40,0.3);animation:pulse 1s infinite;"></div>`, iconSize:[22,22], iconAnchor:[11,11] });
      pendingMarkerRef.current = L.marker([lat,lng],{icon:pIcon}).addTo(map);
      setGenSuggestion(null);
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat.toFixed(5)}&lon=${lng.toFixed(5)}&format=json`)
        .then(r=>r.json()).then(d=>{
          const loc = d.address?[d.address.city||d.address.town||d.address.village,d.address.country].filter(Boolean).join(", "):"";
          const name = d.name||d.address?.tourism||d.address?.amenity||loc||"";
          setPinForm({lat,lng,locationName:loc});
          setForm(f=>({...f,locationName:loc,title:name||loc||"",date:new Date().toISOString().split("T")[0],notes:"",photo:null}));
        }).catch(()=>{ setPinForm({lat,lng,locationName:""}); setForm(f=>({...f,locationName:"",title:"",date:new Date().toISOString().split("T")[0],notes:"",photo:null})); });
    });
    return ()=>{ map.remove(); leafletMap.current=null; };
  },[]);

  // ── Render markers ─────────────────────────────────────────────────────────
  useEffect(()=>{
    const L = window.L;
    if(!leafletMap.current) return;
    const map = leafletMap.current;
    Object.values(markersRef.current).forEach(m=>m.remove());
    markersRef.current = {};
    memories.forEach(mem=>{
      const icon = L.divIcon({
        className:"",
        html:`<div style="display:flex;flex-direction:column;align-items:center">
          <div style="font-size:18px;line-height:1">${mem.mood}</div>
          <div style="width:12px;height:12px;background:#FFA828;border:2px solid #fff;border-radius:50%;margin-top:2px;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>
        </div>`,
        iconSize:[30,36], iconAnchor:[15,36], popupAnchor:[0,-38]
      });
      const m = L.marker([mem.lat,mem.lng],{icon}).addTo(map);
      m.bindPopup(`<div class="popup-title">${mem.mood} ${mem.title}</div><div class="popup-meta">📍 ${mem.locationName||""}${mem.locationName?" · ":""}${mem.date}</div>${mem.notes?`<div class="popup-notes">${mem.notes.slice(0,120)}${mem.notes.length>120?"…":""}</div>`:""}`);
      markersRef.current[mem.id] = m;
    });
    if(memories.length>0){ try{ leafletMap.current.fitBounds(memories.map(m=>[m.lat,m.lng]),{padding:[40,40],maxZoom:12}); }catch{} }
  },[memories]);

  // ── Photo handler ──────────────────────────────────────────────────────────
  const handlePhotoChange = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ratio = Math.min(600/img.width,600/img.height,1);
        canvas.width=img.width*ratio; canvas.height=img.height*ratio;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        setForm(f=>({...f,photo:canvas.toDataURL("image/jpeg",0.75)}));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const handleSave = () => {
    if(!form.title.trim()||!pinForm) return;
    addMemory({id:Date.now(),lat:pinForm.lat,lng:pinForm.lng,locationName:form.locationName||"",title:form.title.trim(),date:form.date,mood:form.mood,notes:form.notes.trim(),photo:form.photo});
    if(pendingMarkerRef.current){pendingMarkerRef.current.remove();pendingMarkerRef.current=null;}
    setPinForm(null);
    setGenSuggestion(null);
    setForm({title:"",date:new Date().toISOString().split("T")[0],mood:"😍",notes:"",photo:null,locationName:""});
  };

  const handleCancel = () => {
    if(pendingMarkerRef.current){pendingMarkerRef.current.remove();pendingMarkerRef.current=null;}
    setPinForm(null); setGenSuggestion(null);
    setForm(f=>({...f,photo:null,notes:"",title:""}));
  };

  return (
    <div>
      {/* Map */}
      <div className="card" style={{padding:0,overflow:"hidden",borderRadius:18}}>
        <div id="travel-map" ref={mapRef} />
      </div>
      <div className="map-hint">📍 Tap anywhere on the map to drop a memory pin</div>

      {/* Journal header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",margin:"14px 0 10px"}}>
        <div className="card-title" style={{marginBottom:0}}>📖 Memory Journal</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div className="progress-pill">✨ {memories.length}</div>
          {memories.length >= 2 && (
            <button className="ai-gen-btn" onClick={generateStory} disabled={story.loading}>
              {story.loading
                ? <span className="dots"><span>·</span><span>·</span><span>·</span></span>
                : "📖 Story"}
            </button>
          )}
        </div>
      </div>

      {/* Timeline */}
      {memories.length===0 ? (
        <div className="empty" style={{paddingTop:24}}>
          <div className="empty-icon">🗺️</div>
          <div className="empty-msg">Tap the map to drop your first memory pin.<br/>Your journey starts with one step!</div>
        </div>
      ) : (
        <div className="timeline">
          {[...memories].sort((a,b)=>b.date.localeCompare(a.date)).map(mem=>{
            const enh = enhancing[mem.id] || {};
            return (
              <div key={mem.id} className="memory-card">
                <div className="mem-header">
                  <div className="mem-mood">{mem.mood}</div>
                  <div className="mem-info">
                    <div className="mem-title">{mem.title}</div>
                    <div className="mem-meta">
                      {mem.locationName&&<span>📍 {mem.locationName} · </span>}
                      <span>🗓️ {mem.date}</span>
                    </div>
                  </div>
                  <button className="btn-del" onClick={()=>deleteMemory(mem.id)}>✕</button>
                </div>

                {mem.notes&&<div className="mem-notes">{mem.notes}</div>}
                {mem.photo&&<img className="mem-photo" src={mem.photo} alt="Memory" />}

                {/* Enhance result */}
                {enh.result && (
                  <div>
                    <div style={{fontSize:10,color:"var(--amber)",fontWeight:700,letterSpacing:"0.8px",textTransform:"uppercase",marginTop:10,marginBottom:4}}>✨ AI Enhanced</div>
                    <div className="enhance-result">{enh.result}</div>
                    <div className="enhance-actions">
                      <button className="btn btn-sm" onClick={()=>acceptEnhancement(mem)}>Accept & Replace</button>
                      <button className="btn-ghost" style={{fontSize:11}} onClick={()=>dismissEnhancement(mem.id)}>Discard</button>
                    </div>
                  </div>
                )}

                <div className="mem-coords">
                  <span>🌐</span>
                  <span>{mem.lat.toFixed(4)}°, {mem.lng.toFixed(4)}°</span>
                  <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                    <button className="ai-gen-btn" disabled={enh.loading}
                      onClick={()=>enhanceMemory(mem)}
                      style={{fontSize:10,padding:"3px 9px"}}>
                      {enh.loading?<span className="dots"><span>·</span><span>·</span><span>·</span></span>:"✨ Enhance"}
                    </button>
                    <button className="btn-ghost" style={{fontSize:10,padding:"3px 9px"}}
                      onClick={()=>{ if(leafletMap.current) leafletMap.current.flyTo([mem.lat,mem.lng],13,{duration:1.2}); window.scrollTo({top:0,behavior:"smooth"}); }}>
                      Map
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Pin drop form overlay ── */}
      {pinForm&&(
        <div className="pin-form-overlay" onClick={e=>e.target===e.currentTarget&&handleCancel()}>
          <div className="pin-form" style={{overflowY:"auto",maxHeight:"90vh"}}>
            <div className="pin-form-title">📍 Add Memory Pin</div>

            {/* AI Generate bar */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{fontSize:12,color:"var(--text-dim)"}}>
                {form.locationName||form.title ? `📍 ${form.locationName||form.title}` : "Drop a pin to get started"}
              </div>
              <button className="ai-gen-btn" disabled={genLoading||(!form.title&&!form.locationName)}
                onClick={generateMemoryNote}>
                {genLoading
                  ? <span className="dots"><span>·</span><span>·</span><span>·</span></span>
                  : "✨ AI Generate"}
              </button>
            </div>

            {/* AI suggestion preview */}
            {genSuggestion && (
              <div className="gen-suggestion-bar">
                <div style={{marginBottom:6,display:"flex",gap:8,alignItems:"center"}}>
                  <strong>{genSuggestion.mood} {genSuggestion.title}</strong>
                </div>
                <div style={{fontSize:12,lineHeight:1.7}}>{genSuggestion.notes}</div>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button className="btn btn-sm" onClick={acceptSuggestion}>Use this ✓</button>
                  <button className="btn-ghost" style={{fontSize:11}} onClick={()=>setGenSuggestion(null)}>Discard</button>
                </div>
              </div>
            )}

            <div className="flex flex-col gap-8">
              <input className="input" placeholder="What's this place?" maxLength={60}
                value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} />
              <input className="input" placeholder="Location (auto-detected)" maxLength={80}
                value={form.locationName} onChange={e=>setForm(f=>({...f,locationName:e.target.value}))} />

              <div className="grid-2">
                <div><div className="card-title-small">Date</div>
                  <input type="date" className="input" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} /></div>
                <div><div className="card-title-small">Mood</div>
                  <div className="mood-row">{MOODS.slice(0,6).map(m=>(
                    <button key={m} className={`mood-btn${form.mood===m?" on":""}`} onClick={()=>setForm(f=>({...f,mood:m}))}>{m}</button>
                  ))}</div>
                </div>
              </div>
              <div className="mood-row">{MOODS.slice(6).map(m=>(
                <button key={m} className={`mood-btn${form.mood===m?" on":""}`} onClick={()=>setForm(f=>({...f,mood:m}))}>{m}</button>
              ))}</div>

              <textarea className="input" placeholder="Jot a few words… or tap ✨ AI Generate above to let AI write it for you" rows={3}
                value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} />

              <div className="photo-upload-area">
                <input type="file" accept="image/*" capture="environment" onChange={handlePhotoChange} />
                {form.photo ? <img className="photo-preview" src={form.photo} alt="Preview" />
                  : <div className="photo-upload-label">📷 Tap to attach a photo</div>}
              </div>
            </div>

            <div className="flex gap-8 mt-12">
              <button className="btn-ghost flex-1" onClick={handleCancel} style={{textAlign:"center"}}>Cancel</button>
              <button className="btn flex-1" onClick={handleSave} disabled={!form.title.trim()}>Save Memory ✨</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Travel Story Modal ── */}
      {showStory&&(
        <div className="story-overlay" onClick={e=>e.target===e.currentTarget&&setShowStory(false)}>
          <div className="story-sheet">
            <div className="story-header">
              <div className="story-title">📖 {trip.name||"My Travel Story"}</div>
              <button className="btn-del" style={{fontSize:20}} onClick={()=>setShowStory(false)}>✕</button>
            </div>
            <div className="story-body">
              {story.loading
                ? <div style={{textAlign:"center",paddingTop:40}}>
                    <div style={{fontSize:32,marginBottom:12}}>✍️</div>
                    <div style={{color:"var(--text-dim)",fontSize:13}}>
                      Weaving your memories into a story<span className="dots"><span>·</span><span>·</span><span>·</span></span>
                    </div>
                  </div>
                : story.text
              }
            </div>
            {!story.loading&&story.text&&(
              <div className="story-footer">
                <button className="btn btn-full" onClick={generateStory}>🔄 Regenerate</button>
              </div>
            )}
          </div>
        </div>
      )}

      <style>{`
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 4px rgba(255,168,40,0.3)} 50%{box-shadow:0 0 0 8px rgba(255,168,40,0.1)} }
      `}</style>
    </div>
  );
}

/* ── Main App ─────────────────────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState(0);
  const [isOnline, setIsOnline] = useState(navigator.onLine);
  const [installPrompt, setInstallPrompt] = useState(null);
  const [showInstall, setShowInstall] = useState(false);
  const [showShare, setShowShare] = useState(false);
  const [quickExpense, setQuickExpense] = useState(null); // {act, day}
  const [quickMemoryCtx, setQuickMemoryCtx] = useState(null); // {act, day}
  const [copiedFlash, setCopiedFlash] = useState("");

  // ── Persistent state ──
  const [trip, setTrip] = useState(() => LS.get("tc_trip", {name:"",destination:"",startDate:"",endDate:""}));
  const [itinerary, setItinerary] = useState(() => LS.get("tc_itin", []));
  const [packing, setPacking] = useState(() => {
    const saved = LS.get("tc_pack", null);
    if (saved) return saved;
    const p = {};
    Object.entries(DEFAULT_PACKING).forEach(([cat,items]) => {
      p[cat] = items.map((name,i)=>({id:`${cat}-${i}`,name,checked:false}));
    });
    return p;
  });
  const [totalBudget, setTotalBudget]   = useState(() => LS.get("tc_budget", 2000));
  const [dailyBudget, setDailyBudget]   = useState(() => LS.get("tc_daily_budget", 0));
  const [notifPerm,   setNotifPerm]     = useState(() => typeof Notification !== "undefined" ? Notification.permission : "default");
  const [nudge,       setNudge]         = useState(null);
  const [geoDetectEnabled, setGeoDetectEnabled] = useState(() => LS.get("tc_geo_enabled", true));
  const [geoPrompt,   setGeoPrompt]     = useState(null); // {country, currency, flag, cc}
  const [geoChecking, setGeoChecking]   = useState(false);
  const nudgeTimer = useRef(null);
  const geoTimer   = useRef(null);
  const [baseCurrency, setBaseCurrency] = useState(() => LS.get("tc_basecurr", "USD"));
  const [expenses, setExpenses] = useState(() => LS.get("tc_expenses", []));
  const [people, setPeople] = useState(() => LS.get("tc_people", []));
  const [memories, setMemories] = useState(() => LS.get("tc_memories", []));
  const [docs,     setDocs]     = useState(() => LS.get("tc_docs",     []));

  // Explore
  const [weatherCity, setWeatherCity] = useState("");
  const [weatherData, setWeatherData] = useState(null);
  const [weatherLoading, setWeatherLoading] = useState(false);
  const [currFrom, setCurrFrom] = useState(baseCurrency);
  const [currTo, setCurrTo] = useState("SGD");
  const [currAmount, setCurrAmount] = useState("100");
  const [currResult, setCurrResult] = useState(null);
  const [aiQuery, setAiQuery] = useState("");
  const [aiResponse, setAiResponse] = useState("");
  const [aiLoading, setAiLoading] = useState(false);

  // Quick expense form
  const [qeForm, setQeForm] = useState({desc:"",amount:"",currency:baseCurrency,cat:EXPENSE_CATS[0]});
  const [qeConverting, setQeConverting] = useState(false);
  const [qePreview, setQePreview] = useState(null);

  // ── Online/offline ──
  useEffect(() => {
    const on=()=>setIsOnline(true), off=()=>setIsOnline(false);
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return ()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); };
  }, []);

  // ── PWA install ──
  useEffect(() => {
    const h=(e)=>{e.preventDefault();setInstallPrompt(e);setShowInstall(true);};
    window.addEventListener("beforeinstallprompt",h);
    return ()=>window.removeEventListener("beforeinstallprompt",h);
  }, []);

  // ── Deep-link on load (e.g. ?trip=blobId) ──
  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const tripCode = params.get("trip");
    if (tripCode) { setShowShare(true); }
  },[]);

  const handleInstall = async () => {
    if (!installPrompt) return;
    installPrompt.prompt();
    await installPrompt.userChoice;
    setShowInstall(false); setInstallPrompt(null);
  };

  // ── Persist helpers ──
  const saveTrip          = t => { setTrip(t);         LS.set("tc_trip",t); };
  const saveItinerary     = i => { setItinerary(i);    LS.set("tc_itin",i); };
  const savePacking       = p => { setPacking(p);      LS.set("tc_pack",p); };
  const saveBudget        = b => { setTotalBudget(b);  LS.set("tc_budget",b); };
  const saveDailyBudget   = b => { setDailyBudget(b);  LS.set("tc_daily_budget",b); };
  const saveBaseCurrency  = c => { setBaseCurrency(c); LS.set("tc_basecurr",c); };
  const saveExpenses      = e => { setExpenses(e);     LS.set("tc_expenses",e); };
  const savePeople        = p => { setPeople(p);       LS.set("tc_people",p); };
  const saveMemories      = m => { setMemories(m);     LS.set("tc_memories",m); };
  const saveDocs          = d => { setDocs(d);         LS.set("tc_docs",d); };

  // ── Notification helpers ──────────────────────────────────────────────────
  // ── Geo currency detection ────────────────────────────────────────────────
  const saveGeoDetectEnabled = (v) => { setGeoDetectEnabled(v); LS.set("tc_geo_enabled", v); };

  const detectLocationCurrency = (manual = false) => {
    if (!navigator.geolocation) return;
    const today = new Date().toISOString().split("T")[0];
    // Rate-limit: once per day unless manual
    if (!manual && LS.get("tc_geo_checked","") === today) return;
    setGeoChecking(true);
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        try {
          const { latitude: lat, longitude: lng } = pos.coords;
          const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat.toFixed(4)}&lon=${lng.toFixed(4)}&format=json`);
          const data = await res.json();
          const cc   = data.address?.country_code?.toUpperCase();
          if (!cc) { setGeoChecking(false); return; }
          const detectedCurrency = COUNTRY_CURRENCY[cc];
          LS.set("tc_geo_checked", today);
          LS.set("tc_geo_last_cc", cc);
          setGeoChecking(false);
          if (!detectedCurrency || detectedCurrency === baseCurrency) return;
          const flag    = countryFlag(cc);
          const country = data.address?.country || cc;
          setGeoPrompt({ country, currency: detectedCurrency, flag, cc });
          clearTimeout(geoTimer.current);
          geoTimer.current = setTimeout(() => setGeoPrompt(null), 14000);
        } catch { setGeoChecking(false); }
      },
      () => setGeoChecking(false),
      { timeout: 9000, maximumAge: 300000 }
    );
  };

  const acceptGeoCurrency = () => {
    if (!geoPrompt) return;
    saveBaseCurrency(geoPrompt.currency);
    clearTimeout(geoTimer.current);
    setGeoPrompt(null);
    flash(`✓ Switched to ${geoPrompt.currency}`);
  };

  // Auto-detect on first mount (2 s delay so app renders first)
  useEffect(() => {
    if (geoDetectEnabled) setTimeout(() => detectLocationCurrency(false), 2000);
  }, []);

  const requestNotifPermission = async () => {
    if (typeof Notification === "undefined") return;
    const result = await Notification.requestPermission();
    setNotifPerm(result);
    return result;
  };

  const sendPushNotification = (title, body, tag) => {
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
    if (!("serviceWorker" in navigator)) return;
    navigator.serviceWorker.ready.then(reg => {
      reg.showNotification(title, {
        body, tag, renotify: false,
        icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%2307101F'/%3E%3Ctext y='130' x='96' text-anchor='middle' font-size='110'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E",
        data: { url: "./index.html" }
      });
    }).catch(()=>{});
  };

  const showNudge = (type, title, sub) => {
    setNudge({ type, title, sub });
    clearTimeout(nudgeTimer.current);
    nudgeTimer.current = setTimeout(() => setNudge(null), 6000);
  };

  const checkDailyLimit = (newExpenses) => {
    if (!dailyBudget || dailyBudget <= 0) return;
    const todayISO = new Date().toISOString().split("T")[0];
    const todayExps = newExpenses.filter(e => {
      if (e.dateISO) return e.dateISO === todayISO;
      try { return new Date(e.date).toISOString().split("T")[0] === todayISO; } catch { return false; }
    });
    const todaySpent = todayExps.reduce((s,e) => s + (e.amtBase ?? Number(e.amount ?? 0)), 0);
    const pct = (todaySpent / dailyBudget) * 100;
    const topCats = Object.entries(
      todayExps.reduce((acc,e) => { const c=e.cat?.split(" ")[0]||""; acc[c]=(acc[c]||0)+(e.amtBase??Number(e.amount??0)); return acc; }, {})
    ).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([c])=>c).join(" ");
    const spentStr = `${baseCurrency} ${todaySpent.toFixed(2)}`;
    const limitStr = `${baseCurrency} ${Number(dailyBudget).toFixed(2)}`;
    const key80    = `tc_notif_${todayISO}_80`;
    const key100   = `tc_notif_${todayISO}_100`;
    if (pct >= 100 && !LS.get(key100,"")) {
      LS.set(key100,"1");
      const t="🚨 Daily limit reached", s=`${spentStr} spent today — hit your ${limitStr} limit${topCats?" · "+topCats:""}`;
      sendPushNotification(t,s,"daily-100"); showNudge("over",t,s);
    } else if (pct >= 80 && !LS.get(key80,"")) {
      LS.set(key80,"1");
      const t="⚠️ 80% of daily budget used", s=`${spentStr} of ${limitStr} today${topCats?" · "+topCats:""}`;
      sendPushNotification(t,s,"daily-80"); showNudge("warn",t,s);
    }
  };

  useEffect(() => {
    if (dailyBudget > 0 && expenses.length > 0) checkDailyLimit(expenses);
  }, [expenses, dailyBudget]);

  // ── Itinerary ──
  const addDay = () => { const n=itinerary.length+1; saveItinerary([...itinerary,{id:Date.now(),day:n,label:`Day ${n}`,activities:[]}]); };
  const removeDay = id => saveItinerary(itinerary.filter(d=>d.id!==id).map((d,i)=>({...d,day:i+1,label:`Day ${i+1}`})));
  const addActivity = (dayId,text) => saveItinerary(itinerary.map(d=>d.id===dayId?{...d,activities:[...d.activities,{id:Date.now(),text,done:false}]}:d));
  const toggleActivity = (dayId,actId) => saveItinerary(itinerary.map(d=>d.id===dayId?{...d,activities:d.activities.map(a=>a.id===actId?{...a,done:!a.done}:a)}:d));
  const removeActivity = (dayId,actId) => saveItinerary(itinerary.map(d=>d.id===dayId?{...d,activities:d.activities.filter(a=>a.id!==actId)}:d));

  // ── Packing ──
  const togglePacking  = (cat,id) => savePacking({...packing,[cat]:packing[cat].map(i=>i.id===id?{...i,checked:!i.checked}:i)});
  const addPackingItem = (cat,name) => savePacking({...packing,[cat]:[...packing[cat],{id:`${cat}-${Date.now()}`,name,checked:false}]});

  // ── Memories ──
  const addMemory    = mem => saveMemories([...memories, mem]);
  const updateMemory = mem => saveMemories(memories.map(m=>m.id===mem.id?mem:m));
  const deleteMemory = id  => saveMemories(memories.filter(m=>m.id!==id));

  // ── Weather ──
  const fetchWeather = async (cityOverride) => {
    const city = (cityOverride||weatherCity||trip.destination||"").trim();
    if(!city) return;
    setWeatherLoading(true); setWeatherData(null);
    try {
      const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`).then(r=>r.json());
      if(!geo.results?.length){setWeatherData({error:"City not found"});setWeatherLoading(false);return;}
      const {latitude,longitude,name,country}=geo.results[0];
      const wd = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`).then(r=>r.json());
      const code=wd.current.weather_code;
      setWeatherData({city:name,country,temp:Math.round(wd.current.temperature_2m),humidity:wd.current.relative_humidity_2m,wind:Math.round(wd.current.wind_speed_10m),code,icon:WC_ICON(code),unit:wd.current_units.temperature_2m});
    } catch { setWeatherData({error:"Failed to fetch"}); }
    setWeatherLoading(false);
  };

  // ── Currency ──
  const convertCurrency = async () => {
    setCurrResult(null);
    try { const d=await fetch(`https://api.frankfurter.app/latest?from=${currFrom}&to=${currTo}&amount=${currAmount}`).then(r=>r.json()); setCurrResult(d.rates[currTo]); }
    catch { setCurrResult("Error"); }
  };

  // ── AI ──
  const getAiTip = async () => {
    if(!aiQuery.trim()) return;
    setAiLoading(true); setAiResponse("");
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"You are a helpful travel expert. Give practical, concise, actionable travel tips. Use bullet points with • symbols. Keep responses under 200 words.",messages:[{role:"user",content:aiQuery}]})});
      const d=await res.json(); setAiResponse(d.content?.[0]?.text||"No response.");
    } catch { setAiResponse("⚠️ Failed. Check your connection."); }
    setAiLoading(false);
  };

  // ── Quick Expense (from activity) ──
  useEffect(()=>{
    if(!quickExpense) return;
    setQeForm({desc:quickExpense.act.text,amount:"",currency:baseCurrency,cat:EXPENSE_CATS[4]});
    setQePreview(null);
  },[quickExpense]);

  useEffect(()=>{
    setQePreview(null);
    if(!qeForm.amount||qeForm.currency===baseCurrency) return;
    let cancelled=false; setQeConverting(true);
    fetch(`https://api.frankfurter.app/latest?from=${qeForm.currency}&to=${baseCurrency}`)
      .then(r=>r.json()).then(d=>{
        if(cancelled) return; setQeConverting(false);
        const rate=d.rates[baseCurrency];
        if(rate) setQePreview({rate,amtBase:Number(qeForm.amount)*rate});
      }).catch(()=>setQeConverting(false));
    return ()=>{cancelled=true;};
  },[qeForm.amount,qeForm.currency]);

  const submitQuickExpense = async () => {
    if(!qeForm.amount||!qeForm.desc) return;
    const originalAmount=Number(qeForm.amount);
    let amtBase=originalAmount, usedRate=1;
    if(qeForm.currency!==baseCurrency){
      const rate=qePreview?.rate;
      if(rate){amtBase=originalAmount*rate;usedRate=rate;}
    }
    saveExpenses([...expenses,{
      id:Date.now(),desc:qeForm.desc,cat:qeForm.cat,
      originalAmount,currency:qeForm.currency,amtBase,usedRate,
      paidBy:"Me",splits:null,
      activityId:quickExpense.act.id,activityText:quickExpense.act.text,
      dayId:quickExpense.day.id,dayLabel:quickExpense.day.label,
      date:new Date().toLocaleDateString(),
      dateISO: new Date().toISOString().split("T")[0],
    }]);
    setQuickExpense(null);
    flash("💰 Expense logged!");
  };

  // ── Quick Memory (from activity) ──
  const onQuickMemory = (act, day) => {
    setQuickMemoryCtx({act,day});
    setTab(5); // navigate to Memories tab — map handles pre-filling
  };

  const flash = (msg) => { setCopiedFlash(msg); setTimeout(()=>setCopiedFlash(""),2200); };

  // ── Navigate ──
  const navigateTo = (dest) => {
    if(dest==="share") { setShowShare(true); return; }
    setTab(dest);
  };

  // ── Derived ──
  const packingTotal = Object.values(packing).flat().length;
  const packingDone  = Object.values(packing).flat().filter(i=>i.checked).length;
  const subtitle = [trip.destination, trip.startDate&&trip.endDate&&`${trip.startDate} → ${trip.endDate}`].filter(Boolean).join("  ·  ")||"Where are you headed?";

  const TABS = [
    {label:"Home",   icon:"🏠"},
    {label:"Plan",   icon:"📋"},
    {label:"Pack",   icon:"🧳"},
    {label:"Budget", icon:"💰"},
    {label:"Explore",icon:"🌍"},
    {label:"Memories",icon:"📸"},
    {label:"Docs",   icon:"🗄️"},
  ];

  // ── Deep-link trip code ──
  const initialShareCode = (() => {
    try { return new URLSearchParams(window.location.search).get("trip")||""; } catch { return ""; }
  })();

  return (
    <div className="app">
      {!isOnline&&<div className="offline-toast">📡 Offline — saved data still available</div>}

      {showInstall&&(
        <div className="install-banner">
          <span>✈️</span>
          <div className="ib-text">Install TravelPal for offline access</div>
          <button className="ib-btn" onClick={handleInstall}>Install</button>
          <button className="ib-close" onClick={()=>setShowInstall(false)}>✕</button>
        </div>
      )}

      {/* ── Nudge banner ── */}
      {nudge&&(
        <div className={`nudge-banner ${nudge.type}`} onClick={()=>setNudge(null)}>
          <div className="nudge-icon">{nudge.type==="over"?"🚨":"⚠️"}</div>
          <div className="nudge-body">
            <div className="nudge-title">{nudge.title}</div>
            <div className="nudge-sub">{nudge.sub}</div>
          </div>
          <button className="nudge-close" onClick={e=>{e.stopPropagation();setNudge(null);}}>✕</button>
        </div>
      )}

      {/* ── Geo currency banner ── */}
      {geoPrompt&&(
        <div className="geo-banner">
          <div className="geo-flag">{geoPrompt.flag}</div>
          <div className="geo-body">
            <div className="geo-title">You're in {geoPrompt.country}</div>
            <div className="geo-sub">Local currency is {geoPrompt.currency} — switch?</div>
          </div>
          <button className="geo-accept" onClick={acceptGeoCurrency}>Use {geoPrompt.currency}</button>
          <button className="geo-dismiss" onClick={()=>setGeoPrompt(null)}>✕</button>
        </div>
      )}

      {/* Header */}
      <div className="header">
        <div className="header-top">
          <input className="trip-name-input flex-1" value={trip.name}
            onChange={e=>saveTrip({...trip,name:e.target.value})} placeholder="✈️ Name Your Trip" />
          <div style={{display:"flex",gap:7,alignItems:"center",flexShrink:0}}>
            <div className="progress-pill">🧳 {packingDone}/{packingTotal}</div>
            <button className="header-share-btn" onClick={()=>setShowShare(true)} title="Share & Invite">📤</button>
          </div>
        </div>
        <div className="header-sub">{subtitle}</div>
      </div>

      {/* Content */}
      <div className="content">
        <div className="content-inner">
          {tab===0&&<Dashboard trip={trip} itinerary={itinerary} packing={packing} expenses={expenses} baseCurrency={baseCurrency} memories={memories} weatherData={weatherData} fetchWeather={fetchWeather} navigateTo={navigateTo} toggleActivity={toggleActivity} removeActivity={removeActivity} onQuickExpense={(a,d)=>setQuickExpense({act:a,day:d})} onQuickMemory={onQuickMemory}/>}
          {tab===1&&<PlanTab trip={trip} saveTrip={saveTrip} itinerary={itinerary} addDay={addDay} addActivity={addActivity} toggleActivity={toggleActivity} removeDay={removeDay} removeActivity={removeActivity} expenses={expenses} baseCurrency={baseCurrency} memories={memories} navigateTo={navigateTo} onQuickExpense={(a,d)=>setQuickExpense({act:a,day:d})} onQuickMemory={onQuickMemory}/>}
          {tab===2&&<PackTab packing={packing} togglePacking={togglePacking} addPackingItem={addPackingItem} packingTotal={packingTotal} packingDone={packingDone} trip={trip} itinerary={itinerary}/>}
          {tab===3&&<BudgetTab totalBudget={totalBudget} saveBudget={saveBudget} baseCurrency={baseCurrency} saveBaseCurrency={saveBaseCurrency} expenses={expenses} saveExpenses={saveExpenses} people={people} savePeople={savePeople} docs={docs} saveDocs={saveDocs} dailyBudget={dailyBudget} saveDailyBudget={saveDailyBudget} notifPerm={notifPerm} requestNotifPermission={requestNotifPermission} geoDetectEnabled={geoDetectEnabled} saveGeoDetectEnabled={saveGeoDetectEnabled} geoChecking={geoChecking} onDetectNow={()=>detectLocationCurrency(true)}/>}
          {tab===4&&<ExploreTab trip={trip} itinerary={itinerary} weatherCity={weatherCity} setWeatherCity={setWeatherCity} weatherData={weatherData} weatherLoading={weatherLoading} fetchWeather={fetchWeather} currFrom={currFrom} setCurrFrom={setCurrFrom} currTo={currTo} setCurrTo={setCurrTo} currAmount={currAmount} setCurrAmount={setCurrAmount} currResult={currResult} convertCurrency={convertCurrency} aiQuery={aiQuery} setAiQuery={setAiQuery} aiResponse={aiResponse} aiLoading={aiLoading} getAiTip={getAiTip}/>}
          {tab===5&&<MemoriesTab memories={memories} addMemory={addMemory} updateMemory={updateMemory} deleteMemory={deleteMemory} trip={trip} quickMemoryCtx={quickMemoryCtx} clearQuickMemory={()=>setQuickMemoryCtx(null)}/>}
          {tab===6&&<DocsTab docs={docs} saveDocs={saveDocs} expenses={expenses} itinerary={itinerary} navigateTo={navigateTo}/>}
        </div>
      </div>

      {/* Tab bar */}
      <div className="tab-bar">
        {TABS.map((t,i)=>(
          <button key={i} className={`tab-btn${tab===i?" active":""}`} onClick={()=>setTab(i)}>
            <span className="tab-icon">{t.icon}</span>
            <span className="tab-label">{t.label}</span>
          </button>
        ))}
      </div>

      {/* ── Quick Expense Overlay ── */}
      {quickExpense&&(
        <div className="pin-form-overlay" onClick={e=>e.target===e.currentTarget&&setQuickExpense(null)}>
          <div className="pin-form">
            <div className="pin-form-title">💰 Log Expense</div>
            <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:12}}>
              📅 {quickExpense.day.label} · {quickExpense.act.text}
            </div>
            <div className="flex flex-col gap-8">
              <select className="input" value={qeForm.cat} onChange={e=>setQeForm(f=>({...f,cat:e.target.value}))}>
                {EXPENSE_CATS.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <input className="input" placeholder="Description" value={qeForm.desc}
                onChange={e=>setQeForm(f=>({...f,desc:e.target.value}))}/>
              <div className="flex gap-8">
                <input className="input flex-1" type="number" placeholder="Amount"
                  value={qeForm.amount} onChange={e=>setQeForm(f=>({...f,amount:e.target.value}))}/>
                <select className="input" style={{width:86}} value={qeForm.currency}
                  onChange={e=>setQeForm(f=>({...f,currency:e.target.value}))}>
                  {CURRENCIES.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              {qeForm.currency!==baseCurrency&&qeForm.amount&&(
                <div className="rate-note">
                  {qeConverting?"Fetching rate…":qePreview?`≈ ${baseCurrency} ${qePreview.amtBase.toFixed(2)}`:"Could not fetch rate"}
                </div>
              )}
            </div>
            <div className="flex gap-8 mt-12">
              <button className="btn-ghost flex-1" onClick={()=>setQuickExpense(null)}>Cancel</button>
              <button className="btn flex-1" onClick={submitQuickExpense}
                disabled={!qeForm.amount||!qeForm.desc||qeConverting}>Save 💰</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Share Modal ── */}
      {showShare&&(
        <ShareModal
          onClose={()=>setShowShare(false)}
          trip={trip} itinerary={itinerary} packing={packing}
          expenses={expenses} people={people} baseCurrency={baseCurrency}
          totalBudget={totalBudget} memories={memories}
          saveTrip={saveTrip} saveItinerary={saveItinerary} savePacking={savePacking}
          saveExpenses={saveExpenses} savePeople={savePeople}
          saveBudget={saveBudget} saveBaseCurrency={saveBaseCurrency}
          initialCode={initialShareCode}
        />
      )}

      {copiedFlash&&<div className="copied-flash">{copiedFlash}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<!-- Service Worker Registration -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(reg => {
        console.log("✈️ TravelPal SW registered:", reg.scope);
        reg.addEventListener("updatefound", () => {
          const newSW = reg.installing;
          newSW.addEventListener("statechange", () => {
            if (newSW.state === "installed" && navigator.serviceWorker.controller) {
              newSW.postMessage("SKIP_WAITING");
            }
          });
        });
      })
      .catch(err => console.warn("SW registration failed:", err));
  });
}
</script>
</body>
</html>
