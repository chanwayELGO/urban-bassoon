      font-size: 12px; color: rgba(230,217,194,0.55); line-height: 1.6;
      margin-bottom: 14px; padding: 10px 12px;
      background: rgba(255,255,255,0.03); border-radius: 10px;
      border-left: 3px solid rgba(255,168,40,0.3);
    }
    .add-all-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .loading-shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,168,40,0.06) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px; height: 80px; margin-bottom: 10px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ─── Map ──────────────────────────────────────────────────────────────── */
    #travel-map {
      width: 100%; height: 300px; border-radius: 16px;
      overflow: hidden; position: relative;
      border: 1px solid rgba(255,168,40,0.15);
    }
    .leaflet-container { background: #0d1a2e !important; font-family: 'DM Sans', sans-serif; }
    .leaflet-control-attribution { display: none !important; }
    .leaflet-control-zoom a {
      background: rgba(7,16,31,0.95) !important;
      color: var(--amber) !important;
      border-color: rgba(255,168,40,0.2) !important;
      font-size: 16px !important;
    }
    .map-hint {
      font-size: 12px; color: rgba(230,217,194,0.38);
      text-align: center; padding: 8px 0 2px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    /* ─── Pin Drop Form ────────────────────────────────────────────────────── */
    .pin-form-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(7,16,31,0.7);
      backdrop-filter: blur(6px);
      display: flex; align-items: flex-end;
      animation: fadeIn 0.2s ease;
    }
    .pin-form {
      background: linear-gradient(170deg, #0C1B34, #07101F);
      border: 1px solid rgba(255,168,40,0.18);
      border-radius: 24px 24px 0 0;
      padding: 20px 20px calc(20px + var(--safe-bottom));
      width: 100%; max-width: 480px; margin: 0 auto;
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    .pin-form-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px; color: var(--amber); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ─── Mood Picker ──────────────────────────────────────────────────────── */
    .mood-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0; }
    .mood-btn {
      font-size: 22px; background: rgba(255,255,255,0.04);
      border: 2px solid transparent; border-radius: 10px;
      padding: 6px 8px; cursor: pointer; transition: all 0.15s;
      line-height: 1;
    }
    .mood-btn.on { border-color: var(--amber); background: rgba(255,168,40,0.12); transform: scale(1.15); }

    /* ─── Memory Timeline ──────────────────────────────────────────────────── */
    .timeline { position: relative; padding-left: 22px; }
    .timeline::before {
      content: ''; position: absolute; left: 8px; top: 6px; bottom: 6px;
      width: 2px; background: linear-gradient(to bottom, var(--amber), transparent);
      border-radius: 2px;
    }
    .memory-card {
      position: relative; margin-bottom: 16px;
      background: rgba(255,255,255,0.033);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 14px;
      animation: fadeUp 0.3s ease;
    }
    .memory-card::before {
      content: ''; position: absolute; left: -18px; top: 18px;
      width: 10px; height: 10px;
      background: var(--amber); border-radius: 50%;
      border: 2px solid #07101F;
      box-shadow: 0 0 0 3px rgba(255,168,40,0.2);
    }
    .mem-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .mem-mood { font-size: 26px; line-height: 1; flex-shrink: 0; }
    .mem-info { flex: 1; min-width: 0; }
    .mem-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--amber); font-weight: 700; }
    .mem-meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
    .mem-notes { font-size: 13px; line-height: 1.7; color: rgba(230,217,194,0.75); margin-top: 8px; }
    .mem-photo {
      width: 100%; max-height: 180px; object-fit: cover;
      border-radius: 10px; margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .mem-coords {
      font-size: 10px; color: var(--text-dim);
      margin-top: 8px; display: flex; align-items: center; gap: 4px;
    }
    .mem-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }

/* ── Storage helpers ──────────────────────────────────────────────────────── */
const LS = {
  get: (k, def) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch{ return def; } },
  set: (k, v)  => { try { localStorage.setItem(k, JSON.stringify(v)); } catch{} },
};

/* ── ATTACHMENT UTILITIES ─────────────────────────────────────────────────── */

// Compress image file to base64 (max 800px, jpeg 0.78)
const compressImage = (file) => new Promise((resolve) => {
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const MAX = 800;
      const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
      const canvas = document.createElement("canvas");
      canvas.width = img.width * ratio; canvas.height = img.height * ratio;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve({ data: canvas.toDataURL("image/jpeg", 0.78), type: "image/jpeg", name: file.name });
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// Read file as base64 (for PDFs / non-image docs)
const readFileAsBase64 = (file) => new Promise((resolve) => {
  const reader = new FileReader();
  reader.onload = (ev) => resolve({ data: ev.target.result, type: file.type, name: file.name });
  reader.readAsDataURL(file);
});

const isImage = (type) => type && type.startsWith("image/");
const isPDF   = (type) => type === "application/pdf";
const fileExt = (name) => (name||"").split(".").pop().toUpperCase().slice(0,4);
const fileIcon = (type) => isPDF(type) ? "📄" : isImage(type) ? "🖼️" : "📎";
const formatBytes = (str) => { const b = Math.round(str.length * 0.75); return b > 1048576 ? `${(b/1048576).toFixed(1)} MB` : `${Math.round(b/1024)} KB`; };

// Process uploaded files → attachment objects
const processFiles = async (fileList) => {
  const results = [];
  for (const file of Array.from(fileList)) {
    if (file.size > 10 * 1024 * 1024) continue; // skip >10MB
    const att = isImage(file.type) ? await compressImage(file) : await readFileAsBase64(file);
    results.push({ id: Date.now() + Math.random(), ...att, uploadedAt: new Date().toISOString() });
  }
  return results;
};

/* ── ATTACHMENT INLINE COMPONENT ──────────────────────────────────────────── */
// Inline attachment upload strip used inside expense rows / activity rows
function AttachStrip({ attachments = [], onAdd, onRemove, onView, compact = false }) {
  const fileRef = useRef(null);

  const handleFiles = async (e) => {
    const files = e.target.files;
    if (!files.length) return;
    const processed = await processFiles(files);
    if (processed.length) onAdd(processed);
    e.target.value = "";
  };

  return (
    <div>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center", marginTop: compact ? 4 : 8 }}>
        {attachments.map(att => (
          isImage(att.type)
            ? <img key={att.id} src={att.data} className="doc-thumb" alt={att.name} onClick={() => onView(att)} />
            : <div key={att.id} className="doc-file-thumb" onClick={() => onView(att)}>
                <div className="doc-file-icon">{fileIcon(att.type)}</div>
                <div className="doc-file-ext">{fileExt(att.name)}</div>
              </div>
        ))}
        {/* Upload trigger */}
        <div className="attach-btn" style={{ minHeight:compact?28:36, padding: compact?"4px 8px":"6px 10px" }}
          onClick={() => fileRef.current?.click()}>
          📎 {attachments.length > 0 ? `+` : "Attach"}
          <input ref={fileRef} type="file" multiple accept="image/*,.pdf,.doc,.docx,.txt,.csv"
            style={{ display:"none" }} onChange={handleFiles} />
        </div>
      </div>
    </div>
  );
}

/* ── DOCS VAULT TAB ───────────────────────────────────────────────────────── */
const DOC_CATS = [
  { id:"passport",  icon:"🛂", label:"Passport / Visa" },
  { id:"insurance", icon:"🏥", label:"Insurance" },
  { id:"flights",   icon:"✈️", label:"Flights" },
  { id:"hotel",     icon:"🏨", label:"Hotels" },
  { id:"receipt",   icon:"🧾", label:"Receipts" },
  { id:"ticket",    icon:"🎟️", label:"Tickets / Bookings" },
  { id:"map",       icon:"🗺️", label:"Maps / Guides" },
  { id:"other",     icon:"📎", label:"Other" },
];

function DocsTab({ docs, saveDocs, expenses, itinerary, navigateTo }) {
  const [filterCat, setFilterCat] = useState("all");
  const [viewingAtt, setViewingAtt] = useState(null);
  const [addingDoc,  setAddingDoc]  = useState(false);
  const [newDocForm, setNewDocForm] = useState({ name:"", cat:"other", linkedTo:"none", linkedId:"" });
  const fileRef = useRef(null);

  // All activities flat list for linking
  const allActivities = itinerary.flatMap(d => d.activities.map(a => ({ ...a, dayLabel: d.label, dayId: d.id })));

  const filtered = filterCat === "all" ? docs : docs.filter(d => d.cat === filterCat);

  const handleUpload = async (e) => {
    const files = e.target.files;
    if (!files.length) return;
    const attachments = await processFiles(files);

      id: att.id,
      name: newDocForm.name || att.name,
      cat: newDocForm.cat,
      linkedTo: newDocForm.linkedTo,
      linkedId: newDocForm.linkedId,
      ...att,
      uploadedAt: att.uploadedAt,
    }));
    saveDocs([...docs, ...newDocs]);
    setAddingDoc(false);
    setNewDocForm({ name:"", cat:"other", linkedTo:"none", linkedId:"" });
    e.target.value = "";
  };

  const deleteDoc = (id) => saveDocs(docs.filter(d => d.id !== id));

  const getLinkedLabel = (doc) => {
    if (doc.linkedTo === "expense") {
      const exp = expenses.find(e => String(e.id) === String(doc.linkedId));
      return exp ? `💰 ${exp.desc}` : null;
    }
    if (doc.linkedTo === "activity") {
      const act = allActivities.find(a => String(a.id) === String(doc.linkedId));
      return act ? `📅 ${act.dayLabel} — ${act.text}` : null;
    }
    return null;
  };

  const catCounts = {};

            <div key={c.id} className={`doc-cat-chip${filterCat===c.id?" on":""}`} onClick={() => setFilterCat(c.id)}>

      {/* Upload Form */}
      {addingDoc && (
        <div className="card" style={{ border:"1px solid rgba(255,168,40,0.2)" }}>

            <div>
              <div className="card-title-small">Category</div>

            <div>

              <div className="doc-vault-icon">{isImage(doc.type) ? "🖼️" : catObj.icon}</div>
              <div className="doc-vault-info">
                <div className="doc-vault-name">{doc.name}</div>
                <div className="doc-vault-meta">
                  {catObj.label} · {formatBytes(doc.data)}
                  {linkedLabel && <span style={{ color:"#5BA4FF", marginLeft:6 }}>🔗 {linkedLabel}</span>}
                </div>
              </div>
              <button className="btn-del" onClick={e => { e.stopPropagation(); deleteDoc(doc.id); }}>✕</button>
            </div>
            {isImage(doc.type) && (
              <img src={doc.data} alt={doc.name}
                style={{ width:"100%", height:100, objectFit:"cover", borderRadius:10, marginTop:10, border:"1px solid rgba(255,255,255,0.06)" }} />
            )}
          </div>
        );
      })}

      {/* Viewer */}
      {viewingAtt && (
        <ViewerModal
          att={viewingAtt}
          onClose={() => setViewingAtt(null)}
          onDelete={() => { deleteDoc(viewingAtt.id); setViewingAtt(null); }}
        />
      )}
    </div>
  );
}

/* ── SWIPEABLE ACTIVITY ───────────────────────────────────────────────────── */
function SwipeableActivity({ act, dayId, onToggle, onDelete, onExpense, onMemory, isFirst }) {
  const THRESHOLD  = 72;   // px to trigger action
  const MAX_DRAG   = 115;  // max px drag before clamping
  const MIN_INTENT = 8;    // px before we commit to horizontal swipe

  const [dx,    setDx]    = useState(0);
  const [phase, setPhase] = useState('idle'); // idle | drag | snap | done-flash | delete-flash | collapsing
  const touch  = useRef({ x0:0, y0:0, decided:false, horiz:false });
  const wrapRef = useRef(null);

  const clamp = (v) => Math.max(-MAX_DRAG, Math.min(MAX_DRAG, v));
  const rProg = Math.min(1, Math.max(0,  dx / THRESHOLD));  // right progress 0→1
  const lProg = Math.min(1, Math.max(0, -dx / THRESHOLD));  // left  progress 0→1

  // ── Touch handlers ──────────────────────────────────────────────────────
  const onStart = (e) => {
    const t = e.touches[0];
    touch.current = { x0: t.clientX, y0: t.clientY, decided: false, horiz: false };
    setPhase('drag');
  };

  const onMove = (e) => {
    const t = e.touches[0];
    const diffX = t.clientX - touch.current.x0;
    const diffY = t.clientY - touch.current.y0;
    // Decide direction once past MIN_INTENT
    if (!touch.current.decided && Math.hypot(diffX, diffY) > MIN_INTENT) {
      touch.current.decided = true;
      touch.current.horiz   = Math.abs(diffX) >= Math.abs(diffY);
    }
    if (!touch.current.decided) return;
    if (!touch.current.horiz) { setPhase('idle'); return; }
    e.preventDefault();
    setDx(clamp(diffX));
  };

  const onEnd = () => {
    const cur = clamp(dx);
    if (cur > THRESHOLD) {
      // ── right swipe: toggle done ───────────────────────────────────────
      setPhase('done-flash'); setDx(0);
      setTimeout(() => { onToggle(); setPhase('idle'); }, 320);
    } else if (cur < -THRESHOLD) {
      // ── left swipe: delete ────────────────────────────────────────────
      setPhase('collapsing'); setDx(0);
      if (wrapRef.current) {
        wrapRef.current.style.maxHeight = wrapRef.current.offsetHeight + 'px';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            if (wrapRef.current) wrapRef.current.style.maxHeight = '0px';
          });
        });
      }
      setTimeout(() => onDelete(), 340);
    } else {
      // ── snap back ─────────────────────────────────────────────────────
      setDx(0); setPhase('snap');
      setTimeout(() => setPhase('idle'), 280);
    }
    touch.current.decided = false;
  };

  // ── Mouse fallback (desktop testing) ────────────────────────────────────
  const mouse = useRef({ down:false, x0:0 });
  const onMouseDown = (e) => { mouse.current = { down:true, x0:e.clientX }; setPhase('drag'); };
  const onMouseMove = (e) => {
    if (!mouse.current.down) return;
    setDx(clamp(e.clientX - mouse.current.x0));
  };
  const onMouseUp = () => { if (!mouse.current.down) return; mouse.current.down=false; onEnd(); };

  const isDone       = act.done;
  const isTransition = phase !== 'drag';
  const flashClass   = phase==='done-flash' ? ' flash-done' : phase==='collapsing'||phase==='delete-flash' ? ' flash-delete' : '';

  return (
    <div
      ref={wrapRef}
      className={`swipe-wrap${phase==='collapsing'?' collapsing':''}`}
      style={{ maxHeight: phase==='collapsing' ? undefined : 'none',
               overflow: 'hidden',
               transition: phase==='collapsing' ? 'max-height 0.32s ease, opacity 0.22s ease' : undefined,
               opacity: phase==='collapsing' ? 0 : 1 }}
    >
      {/* ── Background layers ── */}
      <div className="swipe-bg swipe-bg-right" style={{ opacity: rProg }}>
        <div className="swipe-bg-icon" style={{ transform:`scale(${0.65+rProg*0.5})` }}>
          {isDone ? '↩️' : '✅'}
        </div>
        <span className="swipe-bg-label" style={{ color:'#4DB87A', marginLeft:8 }}>
          {isDone ? 'Undo' : 'Done'}
        </span>
      </div>
      <div className="swipe-bg swipe-bg-left" style={{ opacity: lProg }}>
        <span className="swipe-bg-label" style={{ color:'#FF5C5C', marginRight:8 }}>Delete</span>
        <div className="swipe-bg-icon" style={{ transform:`scale(${0.65+lProg*0.5})` }}>🗑️</div>
      </div>

      {/* ── Content row ── */}
      <div
        className={`swipe-content${isTransition?' has-transition':''}${flashClass}`}
        style={{ transform: `translateX(${phase==='drag' ? dx : 0}px)` }}
        onTouchStart={onStart}
        onTouchMove={onMove}
        onTouchEnd={onEnd}
        onMouseDown={onMouseDown}
        onMouseMove={onMouseMove}
        onMouseUp={onMouseUp}
        onMouseLeave={onMouseUp}
      >
        {/* Status dot */}
        <div className={`swipe-status-dot${isDone?' done':''}`}
          style={{ cursor:'pointer' }}
          onClick={(e) => { e.stopPropagation(); onToggle(); }}>
          {isDone && '✓'}
        </div>

        {/* Text */}
        <span className={`swipe-act-text${isDone?' done':''}`}
          onClick={onToggle}>{act.text}</span>

        {/* Quick actions — only visible when not swiping */}
        <div className="act-quick-btns" style={{ opacity: Math.max(0, 1-Math.abs(dx)/30), flexShrink:0 }}>
          {onExpense && (
            <div className="act-q-btn" title="Log expense"
              onClick={(e) => { e.stopPropagation(); onExpense(); }}>💰</div>
          )}
          {onMemory && (
            <div className="act-q-btn" title="Add memory"
              onClick={(e) => { e.stopPropagation(); onMemory(); }}>📸</div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── DASHBOARD ────────────────────────────────────────────────────────────── */
function Dashboard({ trip, itinerary, packing, expenses, baseCurrency, memories, weatherData, fetchWeather, navigateTo, toggleActivity, removeActivity, onQuickExpense, onQuickMemory }) {
  const today = new Date();

  // ── Timing ────────────────────────────────────────────────────────────────
  const daysUntil      = trip.startDate ? Math.ceil((new Date(trip.startDate) - today) / 86400000) : null;
  const isDepartureDay = daysUntil === 0;
  const isDayBefore    = daysUntil === 1;
  const isOnTrip       = daysUntil !== null && daysUntil <= 0 && (!trip.endDate || new Date(trip.endDate) >= today);
  const tripOver       = trip.endDate && new Date(trip.endDate) < today;
  const currentDayIdx  = trip.startDate ? Math.floor((today - new Date(trip.startDate)) / 86400000) : -1;
  const todayDay       = currentDayIdx >= 0 && currentDayIdx < itinerary.length ? itinerary[currentDayIdx] : null;
  const todayISO       = today.toISOString().split("T")[0];
  const briefCacheKey  = `tc_brief_${trip.startDate}_${todayISO}`;
  const briefSeenKey   = `tc_brief_seen_${trip.startDate}_${todayISO}`;

  // ── Stats ─────────────────────────────────────────────────────────────────
  const packingTotal = Object.values(packing).flat().length;
  const packingDone  = Object.values(packing).flat().filter(i=>i.checked).length;
  const packingPct   = packingTotal ? Math.round(packingDone/packingTotal*100) : 0;
  const spent        = expenses.reduce((s,e)=>s+(e.amtBase??Number(e.amount??0)),0);
  const totalBudget  = LS.get("tc_budget",2000);
  const budgetPct    = totalBudget > 0 ? Math.min(100, Math.round(spent/totalBudget*100)) : 0;
  const allActs      = itinerary.flatMap(d=>d.activities);
  const doneActs     = allActs.filter(a=>a.done).length;

  // ── Brief state ───────────────────────────────────────────────────────────
  const [brief,          setBrief]          = useState(()=>{ try{const c=LS.get(briefCacheKey,null); return c?{step:"ready",data:c}:{step:"idle",data:null};}catch{return{step:"idle",data:null};} });
  const [showModal,      setShowModal]      = useState(false);
  const [exchangeRate,   setExchangeRate]   = useState(null);

  // ── Auto-fetch weather ────────────────────────────────────────────────────
  useEffect(()=>{
    if(trip.destination && !weatherData) fetchWeather(trip.destination);
  },[trip.destination]);

  // ── Auto-show modal on departure day (once per day) ───────────────────────
  useEffect(()=>{
    if(!trip.destination||!trip.startDate) return;
    if(!(isDepartureDay||isDayBefore||(isOnTrip&&currentDayIdx===0))) return;
    const alreadySeen = LS.get(briefSeenKey,"");
    if(brief.step==="ready"&&!alreadySeen){ setShowModal(true); return; }
    if(brief.step==="idle") generateBrief();
  },[trip.startDate, trip.destination, isDepartureDay]);

  // ── Generate brief ────────────────────────────────────────────────────────
  const generateBrief = async () => {
    if(!trip.destination||brief.step==="loading") return;
    setBrief({step:"loading",data:null});

    try {
      // 1. Geocode + fetch forecast (re-use pattern from recheck)
      const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(trip.destination)}&count=1`).then(r=>r.json());
      const loc = geo.results?.[0];
      let forecastDesc = "Weather data unavailable";
      let todayWeather = weatherData;
      if(loc){
        const fw = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weathercode,windspeed_10m_max&current=temperature_2m,weather_code,relative_humidity_2m&timezone=auto&forecast_days=4`).then(r=>r.json());
        const d=fw.daily; const curr=fw.current;
        forecastDesc = d.time.slice(0,4).map((date,i)=>`${date}: ${WC_ICON(d.weathercode[i])} ${WC_DESC(d.weathercode[i])}, ${Math.round(d.temperature_2m_max[i])}/${Math.round(d.temperature_2m_min[i])}°C, rain ${d.precipitation_probability_max[i]||0}%`).join(" | ");
        if(curr&&!todayWeather){ todayWeather={temp:Math.round(curr.temperature_2m),icon:WC_ICON(curr.weather_code),unit:"°C",humidity:curr.relative_humidity_2m}; }
      }

      // 2. Fetch exchange rate
      let rateText = "";
      try{
        const destCurrMap = {"Japan":"JPY","Thailand":"THB","UK":"GBP","France":"EUR","Germany":"EUR","Spain":"EUR","Italy":"EUR","Australia":"AUD","Singapore":"SGD","Malaysia":"MYR","Indonesia":"IDR","Vietnam":"VND","South Korea":"KRW","China":"CNY","India":"INR","UAE":"AED","Canada":"CAD","Mexico":"MXN","Brazil":"BRL","South Africa":"ZAR"};
        const localCurr = Object.entries(destCurrMap).find(([c])=>trip.destination.toLowerCase().includes(c.toLowerCase()))?.[1] || "USD";
        if(localCurr!==baseCurrency){
          const rd = await fetch(`https://api.frankfurter.app/latest?from=${baseCurrency}&to=${localCurr}`).then(r=>r.json());
          const rate = rd.rates[localCurr];
          if(rate){ rateText=`1 ${baseCurrency} = ${Number(rate).toFixed(2)} ${localCurr}`; setExchangeRate({from:baseCurrency,to:localCurr,rate}); }
        }
      }catch{}

      // 3. Build activities context
      const day1Acts = itinerary[0]?.activities.map(a=>a.text).join(", ") || "none planned yet";
      const unpackedCritical = Object.values(packing).flat().filter(i=>!i.checked&&["Passport","Travel insurance","Flight tickets"].some(k=>i.name.includes(k))).map(i=>i.name);

      // 4. Call Claude
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1400,
          system:`You are a world-class travel concierge generating a personalised departure day brief. Return ONLY valid JSON — no markdown.

Shape:
{
  "greeting": "warm, exciting 1-sentence opener personalised to destination (mention city name)",
  "weather": {
    "today_summary": "1 sentence on today's conditions",
    "wear_tip": "specific clothing tip for today based on forecast",
    "days_ahead": "1 sentence pattern for next 3 days"
  },
  "customs": [
    {"emoji":"…","title":"short title","detail":"1-2 sentence practical tip"}
  ],
  "currency": {
    "practical_tip": "1-2 sentences on best way to get/use local currency, avoid common tourist traps",
    "atm_tip": "brief ATM/payment tip"
  },
  "first_hours": [
    {"step":1,"action":"first thing to do on arrival","detail":"specific, practical detail"}
  ],
  "local_phrase": {"phrase":"most useful phrase in local language","pronunciation":"phonetic guide","meaning":"English meaning"},
  "insider_tip": "single powerful insider tip most first-timers miss — be very specific to destination"
}

Rules:
- customs: 3 items, specific and actionable (not generic "be respectful")
- first_hours: 3–4 steps covering transport, SIM, cash, first meal/check-in
- All tips must be specific to the destination, not generic travel advice
- Return ONLY the JSON`,
          messages:[{role:"user",content:
`Destination: ${trip.destination}
Departure: ${trip.startDate}${trip.endDate?" → "+trip.endDate:""}
Trip duration: ${trip.startDate&&trip.endDate?Math.round((new Date(trip.endDate)-new Date(trip.startDate))/86400000)+1:"unknown"} days
Traveller's base currency: ${baseCurrency}${rateText?" ("+rateText+")":""}
Today's weather at destination: ${todayWeather?`${todayWeather.icon} ${todayWeather.temp}${todayWeather.unit}, humidity ${todayWeather.humidity||"?"}%`:"unavailable"}
4-day forecast: ${forecastDesc}
Day 1 planned activities: ${day1Acts}
Unpacked critical items: ${unpackedCritical.length?unpackedCritical.join(", "):"all clear"}

Generate the departure day brief.`
          }]
        })
      });
      const data = await res.json();
      const parsed = JSON.parse((data.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
      if(!parsed.greeting) throw new Error("Empty response");

      LS.set(briefCacheKey, parsed);
      setBrief({step:"ready",data:parsed});
      setShowModal(true);

    }catch(e){
      setBrief({step:"error",data:null,error:e.message});
    }
  };

  const dismissModal = () => {
    setShowModal(false);
    LS.set(briefSeenKey, "1");
  };

  // ── Ring SVG ───────────────────────────────────────────────────────────────
  const Ring = ({pct,color,size=64,stroke=6}) => {
    const r=(size-stroke*2)/2, circ=2*Math.PI*r;
    return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 0.6s ease"}}/>
    </svg>);
  };

  // ── Brief Modal ───────────────────────────────────────────────────────────
  const BriefModal = () => {
    const d = brief.data;
    return (
      <div className="brief-modal-overlay">
        {/* Loading state */}
        {brief.step==="loading"&&(
          <div className="brief-loading-hero">
            <div style={{fontSize:11,color:"rgba(255,168,40,.5)",letterSpacing:"1px",textTransform:"uppercase",fontWeight:700}}>Preparing your brief…</div>

            <div className="brief-loading-shimmer" style={{height:18,width:"50%",opacity:.6}}/>
            <div style={{marginTop:20,display:"flex",flexDirection:"column",gap:10,padding:"0 0 20px"}}>
              {[90,70,80,60].map((w,i)=><div key={i} className="brief-loading-shimmer" style={{height:14,width:`${w}%`,opacity:.4-i*.07}}/>)}
            </div>
            <div style={{textAlign:"center",padding:"20px 0",color:"rgba(255,168,40,.4)",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span className="dots"><span>·</span><span>·</span><span>·</span></span> Claude is writing your trip brief
            </div>
          </div>
        )}

        {/* Error */}
        {brief.step==="error"&&(
          <div style={{padding:40,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:16}}>⚠️</div>

                  </div>
                  {d.customs.map((c,i)=>(
                    <div key={i} className="brief-custom-item">

              {d.local_phrase&&(
                <div className="brief-section">
                  <div className="brief-section-hdr">
                    <div className="brief-section-icon">💬</div>
                    <div className="brief-section-title">Useful Phrase</div>
                  </div>
                  <div className="brief-phrase-box">

              <button className="brief-dismiss-btn" onClick={dismissModal}>
                Let's go! ✈️
              </button>

                ↺ Regenerate brief
              </button>
            </div>
          </>
        )}
      </div>
    );
  };

  return (
    <div>
      {/* Brief modal */}
      {showModal&&(brief.step==="loading"||brief.step==="ready"||brief.step==="error")&&<BriefModal/>}

      {/* ── Compact brief card (when modal dismissed) ── */}
      {!showModal&&brief.step==="ready"&&brief.data&&(isDepartureDay||isDayBefore||isOnTrip)&&(
        <div className="brief-dash-card" onClick={()=>setShowModal(true)}>
          <div className="brief-dash-hdr">
            <div className="brief-dash-icon">{isDepartureDay?"✈️":"🌅"}</div>
            <div className="brief-dash-title">
              {isDepartureDay?"Your Departure Brief":"Day-before Brief"} — {trip.destination}
            </div>
            <div style={{fontSize:18,color:"rgba(255,168,40,.4)"}}>›</div>
          </div>

/* ── PLAN Tab ─────────────────────────────────────────────────────────────── */
function PlanTab({ trip, saveTrip, itinerary, addDay, addActivity, toggleActivity, removeDay, removeActivity, expenses, baseCurrency, memories, navigateTo, onQuickExpense, onQuickMemory }) {
  const [newActs, setNewActs] = useState({});
  const tripDays = trip.startDate && trip.endDate
    ? Math.max(0, Math.round((new Date(trip.endDate)-new Date(trip.startDate))/86400000)+1)
    : null;

  const handleAdd = (dayId) => {
    const t = (newActs[dayId]||"").trim();
    if (!t) return;
    addActivity(dayId, t);
    setNewActs(p=>({...p,[dayId]:""}));
  };

  // Per-day derived stats
  const daySpend = (day) =>
    expenses.filter(e=>e.dayId===day.id).reduce((s,e)=>s+(e.amtBase??Number(e.amount??0)),0);
  const dayMemories = (day) => memories.filter(m=>m.dayId===day.id).length;

  return (
    <div>
      <div className="card">
        <div className="card-title">🗺️ Trip Details</div>
        <div className="flex flex-col gap-8">
          <input className="input" placeholder="Destination (e.g. Tokyo, Japan)"
            value={trip.destination} onChange={e=>saveTrip({...trip,destination:e.target.value})} />
          <div className="grid-2">
            <div><div className="card-title-small">Depart</div>
              <input type="date" className="input" value={trip.startDate} onChange={e=>saveTrip({...trip,startDate:e.target.value})} /></div>
            <div><div className="card-title-small">Return</div>
              <input type="date" className="input" value={trip.endDate} onChange={e=>saveTrip({...trip,endDate:e.target.value})} /></div>
          </div>
          {tripDays && (
            <div style={{fontSize:12,color:"rgba(230,217,194,0.45)",display:"flex",gap:12,flexWrap:"wrap"}}>
              <span>🗓️ {tripDays} {tripDays===1?"day":"days"}</span>
              {trip.destination&&<span>📍 {trip.destination}</span>}
            </div>
          )}
        </div>
      </div>

      <div className="card">
        <div className="flex items-center justify-between" style={{marginBottom:12}}>
          <div className="card-title" style={{marginBottom:0}}>📅 Itinerary</div>
          <button className="btn btn-sm" onClick={addDay}>+ Day</button>
        </div>
        {itinerary.length===0 ? (
          <div className="empty"><div className="empty-icon">🗓️</div><div className="empty-msg">Add days to build your itinerary</div></div>
        ) : itinerary.map(day=>{
          const ds = daySpend(day); const dm = dayMemories(day);
          return (
            <div key={day.id} className="day-card">
              <div className="day-hdr">
                <div className="day-title">{day.label}</div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {ds>0&&<span className="linked-badge" onClick={()=>navigateTo(3)}>💰 {baseCurrency} {ds.toFixed(0)}</span>}
                  {dm>0&&<span className="linked-badge" style={{background:"rgba(255,168,40,0.08)",borderColor:"rgba(255,168,40,0.2)",color:"var(--amber)"}} onClick={()=>navigateTo(5)}>📸 {dm}</span>}
                  <button className="btn-del" onClick={()=>removeDay(day.id)}>✕</button>
                </div>
              </div>
              {day.activities.map((act,i)=>(
                <SwipeableActivity key={act.id}
                  act={act} dayId={day.id}
                  onToggle={()=>toggleActivity(day.id,act.id)}
                  onDelete={()=>removeActivity(day.id,act.id)}
                  onExpense={()=>onQuickExpense(act,day)}
                  onMemory={()=>onQuickMemory(act,day)}
                  isFirst={i===0}
                />
              ))}
              {day.activities.length===0&&(
                <div className="swipe-hint" style={{textAlign:"left",paddingLeft:2}}>Add activities below</div>
              )}
              <div className="flex gap-8 mt-8">
                <input className="input flex-1" style={{padding:"7px 11px",fontSize:12}} placeholder="Add activity…"
                  value={newActs[day.id]||""} onChange={e=>setNewActs(p=>({...p,[day.id]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&handleAdd(day.id)} />
                <button className="btn-ghost" onClick={()=>handleAdd(day.id)}>Add</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── PACK Tab ─────────────────────────────────────────────────────────────── */
function PackTab({ packing, togglePacking, addPackingItem, packingTotal, packingDone, trip, itinerary }) {
  const [newItems, setNewItems] = useState({});
  const [collapsed, setCollapsed] = useState({});
  const pct = packingTotal ? Math.round((packingDone/packingTotal)*100) : 0;

  // ── Re-check state ────────────────────────────────────────────────────────
  const [recheck, setRecheck]   = useState({ step:"idle", forecast:null, result:null, error:"" });
  // step: idle | fetching | analyzing | ready | error
  const [rcAdded, setRcAdded]   = useState({}); // {itemName: true}
  const [rcDismissed, setRcDismissed] = useState(() => LS.get("tc_rc_dismissed",""));

  // Days until departure
  const today = new Date(); today.setHours(0,0,0,0);
  const depDate = trip.startDate ? new Date(trip.startDate) : null;
  const daysUntil = depDate ? Math.ceil((depDate - today) / 86400000) : null;
  const showAlert = daysUntil !== null && daysUntil >= -1 && daysUntil <= 3
    && trip.destination && rcDismissed !== trip.startDate;
  const alertLabel = daysUntil === 0 ? "Departure day" : daysUntil < 0 ? "Trip underway" : `${daysUntil} day${daysUntil!==1?"s":""} to go`;

  // ── Fetch multi-day forecast + run Claude re-check ────────────────────────
  const runRecheck = async () => {
    if (!trip.destination) return;
    setRecheck({ step:"fetching", forecast:null, result:null, error:"" });
    setRcAdded({});

    try {
      // 1. Geocode destination
      const geo = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(trip.destination)}&count=1`
      ).then(r=>r.json());
      if (!geo.results?.length) throw new Error(`"${trip.destination}" not found`);
      const { latitude, longitude, name, country } = geo.results[0];

      // 2. Fetch 7-day daily forecast starting from departure (or today)
      const startDate = trip.startDate
        ? (depDate < today ? today.toISOString().split("T")[0] : trip.startDate)
        : today.toISOString().split("T")[0];
      const fRes = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}` +
        `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weathercode,windspeed_10m_max` +
        `&timezone=auto&forecast_days=7&start_date=${startDate}`
      ).then(r=>r.json());

      const d = fRes.daily;
      const days = d.time.map((date,i) => ({
        date, icon: WC_ICON(d.weathercode[i]),
        maxT: Math.round(d.temperature_2m_max[i]),
        minT: Math.round(d.temperature_2m_min[i]),
        rain: d.precipitation_sum[i]??0,
        rainPct: d.precipitation_probability_max[i]??0,
        wind: Math.round(d.windspeed_10m_max[i]),
        code: d.weathercode[i],
      }));

      const forecastSummary = {
        city: `${name}, ${country}`,
        days,
        avgMaxTemp: Math.round(days.reduce((s,d)=>s+d.maxT,0)/days.length),
        avgMinTemp: Math.round(days.reduce((s,d)=>s+d.minT,0)/days.length),
        rainyDays:  days.filter(d=>d.rain>2).length,
        windyDays:  days.filter(d=>d.wind>40).length,
        unit: fRes.daily_units?.temperature_2m_max || "°C",
        conditions: [...new Set(days.map(d=>WC_DESC(d.code)))].join(", "),
      };
      setRecheck(p=>({...p, step:"analyzing", forecast:days}));

      // 3. Build packing list text
      const packingText = Object.entries(packing)
        .map(([cat, items]) => `${cat}:\n` + items.map(i=>`  - ${i.name}${i.checked?" ✓ (packed)":""}`).join("\n"))
        .join("\n\n");

      const tripDuration = trip.startDate && trip.endDate
        ? Math.round((new Date(trip.endDate)-new Date(trip.startDate))/86400000)+1
        : "unknown";
      const activities = itinerary.flatMap(d=>d.activities.map(a=>a.text)).filter(Boolean);

      // 4. Claude analysis
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1200,
          system: `You are a meticulous travel packing advisor. Compare the traveller's packing list against the actual weather forecast and return ONLY valid JSON — no markdown, no extra text.

Shape:
{
  "weather_summary": "2 sentences describing forecast conditions and what they mean for packing",
  "gaps": [
    {"item": "item name (be specific, e.g. 'compact folding umbrella')", "reason": "why needed, citing specific forecast data", "category": "which packing category it belongs to e.g. 🧴 Toiletries"}
  ],
  "overkill": [
    {"item": "existing item in list that seems unnecessary", "reason": "why, citing forecast e.g. 'avg 28°C forecast, heavy winter coat unnecessary'"}
  ],
  "confirmed": ["item already in list that forecast confirms as essential"],
  "overall": "1-line verdict: ready | minor gaps | needs attention"
}

Rules:
- gaps: only flag genuinely weather-driven gaps (rain gear if rainy, sunscreen if hot, layers if temp swing >10°C). Max 8.
- overkill: only flag items clearly wrong for the weather. Be conservative. Max 4.
- confirmed: flag 3–6 items already packed that are exactly right for this forecast.
- Match item names to existing list items where possible for overkill.
- Return ONLY the JSON.`,
          messages: [{ role:"user", content:
            `Destination: ${forecastSummary.city}
Trip duration: ${tripDuration} days
Planned activities: ${activities.length ? activities.join(", ") : "general sightseeing"}

WEATHER FORECAST (${forecastSummary.days.length} days from ${startDate}):
- Avg high: ${forecastSummary.avgMaxTemp}${forecastSummary.unit}, avg low: ${forecastSummary.avgMinTemp}${forecastSummary.unit}
- Rainy days: ${forecastSummary.rainyDays}/${forecastSummary.days.length}
- Windy days (>40km/h): ${forecastSummary.windyDays}/${forecastSummary.days.length}
- Conditions: ${forecastSummary.conditions}
- Day-by-day: ${days.map(d=>`${d.date}: ${d.icon} ${d.maxT}/${d.minT}${forecastSummary.unit}, rain ${d.rain}mm (${d.rainPct}%), wind ${d.wind}km/h`).join(" | ")}

CURRENT PACKING LIST:
${packingText}

Analyse this and return the JSON re-check report.`
          }]
        })
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text || "";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setRecheck({ step:"ready", forecast:days, result:parsed, error:"" });

    } catch(e) {
      setRecheck({ step:"error", forecast:null, result:null,
        error: e.message.includes("not found") ? e.message : "Re-check failed — check connection and try again." });
    }
  };

  const addGapItem = (item, category) => {
    const cats = Object.keys(packing);
    const matched = cats.find(c => c.toLowerCase().includes((category||"").toLowerCase().replace(/^[\p{Emoji}\s]+/u,"").split(" ")[0].toLowerCase())) || cats[0];
    addPackingItem(matched, item);
    setRcAdded(p=>({...p,[item]:true}));
  };

  const dismissAlert = () => {
    setRcDismissed(trip.startDate);
    LS.set("tc_rc_dismissed", trip.startDate);
  };

  const verdictColor = v => v==="ready"?"#4DB87A":v==="minor gaps"?"#FFA828":"#FF5C5C";
  const verdictIcon  = v => v==="ready"?"✅":v==="minor gaps"?"⚠️":"🚨";

  // Smart Pack state
  const [occasions, setOccasions] = useState([]);
  const [extraNotes, setExtraNotes] = useState("");
  const [suggestions, setSuggestions] = useState(null);   // [{category, reason, items:[]}]
  const [contextSummary, setContextSummary] = useState("");
  const [loadingSuggest, setLoadingSuggest] = useState(false);
  const [addedItems, setAddedItems] = useState({});        // {itemText: true}
  const [showPanel, setShowPanel] = useState(false);

  const OCCASIONS = [
    {id:"beach",     label:"🏖️ Beach"},
    {id:"hiking",    label:"🥾 Hiking"},
    {id:"skiing",    label:"⛷️ Skiing"},
    {id:"business",  label:"💼 Business"},
    {id:"wedding",   label:"💍 Wedding/Formal"},
    {id:"safari",    label:"🦁 Safari"},
    {id:"camping",   label:"⛺ Camping"},
    {id:"cruise",    label:"🚢 Cruise"},
    {id:"backpack",  label:"🎒 Backpacking"},
    {id:"family",    label:"👨‍👩‍👧 Family/Kids"},
    {id:"festival",  label:"🎉 Festival"},
    {id:"religious", label:"🕌 Religious Sites"},
  ];

  const toggleOccasion = (id) => setOccasions(p => p.includes(id) ? p.filter(o=>o!==id) : [...p, id]);

  // Build trip context for the AI
  const buildContext = () => {
    const lines = [];
    if (trip.destination) lines.push(`Destination: ${trip.destination}`);
    if (trip.startDate && trip.endDate) {
      const days = Math.round((new Date(trip.endDate)-new Date(trip.startDate))/86400000)+1;
      lines.push(`Dates: ${trip.startDate} to ${trip.endDate} (${days} days)`);
      // infer season from month
      const month = new Date(trip.startDate).getMonth();
      const season = month<2||month===11?"winter":month<5?"spring":month<8?"summer":"autumn";
      lines.push(`Season (in Northern Hemisphere): ${season}`);
    }
    if (itinerary.length > 0) {
      const allActs = itinerary.flatMap(d=>d.activities.map(a=>a.text)).filter(Boolean);
      if (allActs.length) lines.push(`Planned activities: ${allActs.join(", ")}`);
    }
    if (occasions.length > 0) {
      const labels = occasions.map(id=>OCCASIONS.find(o=>o.id===id)?.label||id).join(", ");
      lines.push(`Occasion/type of trip: ${labels}`);
    }
    if (extraNotes.trim()) lines.push(`Additional notes: ${extraNotes.trim()}`);
    return lines.join("\n");
  };

  // Get all existing item names for dedup
  const existingNames = new Set(Object.values(packing).flat().map(i=>i.name.toLowerCase()));

  const generateSuggestions = async () => {
    if (!trip.destination && occasions.length === 0 && !extraNotes.trim()) return;
    setLoadingSuggest(true);
    setSuggestions(null);
    setAddedItems({});
    const context = buildContext();
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1200,
          system: `You are a world-class travel packing expert. Analyze the trip details and return ONLY valid JSON — no markdown, no extra text.
Return this exact shape:
{
  "context_summary": "1–2 sentence summary of what makes this trip unique from a packing perspective",
  "suggestions": [
    {
      "category": "emoji + category name (e.g. 👕 Clothing)",
      "reason": "brief reason why these items matter for this specific trip",
      "items": ["item1", "item2", "item3"]
    }
  ]
}
Rules:
- 4–7 categories. Each with 3–8 items.
- Items must be SPECIFIC to the trip (e.g. not just "shoes" but "waterproof trail runners for Mt Fuji hike").
- Do NOT repeat items that are obvious universals like passport or phone charger unless context makes them noteworthy.
- Consider destination climate, cultural norms, planned activities, trip length, and occasions.
- Keep item names concise (under 8 words each).
- Return ONLY the JSON object.`,
          messages: [{ role:"user", content: `Trip details:\n${context}\n\nGenerate smart packing suggestions tailored to this specific trip.` }],
        }),
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text || "{}";
      const cleaned = raw.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(cleaned);
      setSuggestions(parsed.suggestions || []);
      setContextSummary(parsed.context_summary || "");
    } catch(e) {
      setSuggestions([]);
      setContextSummary("⚠️ Could not generate suggestions. Check your connection.");
    }
    setLoadingSuggest(false);
  };

  const handleAddChip = (item, cat) => {
    // Find best matching existing category or use the suggestion category
    const existingCats = Object.keys(packing);
    const sugCatName = cat.replace(/^[\p{Emoji}\s]+/u,"").trim();
    const match = existingCats.find(c => c.toLowerCase().includes(sugCatName.toLowerCase().split(" ")[0]));
    const targetCat = match || existingCats[0];
    addPackingItem(targetCat, item);
    setAddedItems(p=>({...p,[item]:true}));
  };

  const handleAddAll = () => {
    if(!suggestions) return;
    suggestions.forEach(group => {
      group.items.forEach(item => {
        if(!addedItems[item] && !existingNames.has(item.toLowerCase())) {
          handleAddChip(item, group.category);
        }
      });
    });
  };

  const handleAdd = (cat) => {
    const n = (newItems[cat]||"").trim();
    if (!n) return;
    addPackingItem(cat,n);
    setNewItems(p=>({...p,[cat]:""}));
  };

  const totalSuggestCount = suggestions ? suggestions.reduce((s,g)=>s+g.items.length,0) : 0;
  const newCount = suggestions ? suggestions.reduce((s,g)=>s+g.items.filter(i=>!existingNames.has(i.toLowerCase())&&!addedItems[i]).length,0) : 0;

  return (
    <div>
      {/* Progress */}
      <div className="card">
        <div className="flex items-center justify-between">
          <div className="card-title" style={{marginBottom:0}}>🧳 Packing List</div>
          <div className="progress-pill">{packingDone}/{packingTotal} packed</div>
        </div>
        <div className="prog-track"><div className="prog-fill" style={{width:`${pct}%`}} /></div>
        <div style={{textAlign:"right",fontSize:11,color:"rgba(230,217,194,0.35)",marginTop:5}}>{pct}% complete</div>
      </div>

      {/* ── Weather Re-check Card ── */}
      <div className="recheck-card">

        {/* Header */}
        <div className="flex items-center justify-between" style={{marginBottom: showAlert||recheck.step!=="idle" ? 12 : 0}}>
          <div className="card-title" style={{marginBottom:0,fontSize:14,color:"#5BA4FF"}}>
            🌤️ Weather Re-check
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {recheck.step==="ready"&&recheck.result&&(
              <span style={{fontSize:12,fontWeight:700,color:verdictColor(recheck.result.overall)}}>
                {verdictIcon(recheck.result.overall)} {recheck.result.overall}
              </span>
            )}
            {recheck.step!=="fetching"&&recheck.step!=="analyzing"&&(
              <button className="btn-ghost" style={{fontSize:11,padding:"4px 10px",borderColor:"rgba(91,164,255,0.3)",color:"#5BA4FF"}}
                onClick={runRecheck} disabled={!trip.destination}>
                {recheck.step==="idle"?"Run check":"↺ Re-run"}
              </button>
            )}
            {(recheck.step==="fetching"||recheck.step==="analyzing")&&(
              <div style={{fontSize:11,color:"rgba(91,164,255,0.7)",display:"flex",alignItems:"center",gap:6}}>
                <span className="dots"><span>·</span><span>·</span><span>·</span></span>
                {recheck.step==="fetching"?"Fetching forecast":"Analysing list"}
              </div>
            )}
          </div>
        </div>

        {/* Auto-trigger alert */}
        {showAlert && recheck.step==="idle" && (
          <div className="recheck-alert" onClick={runRecheck}>
            <div className="recheck-alert-icon">⏰</div>
            <div className="recheck-alert-text">
              <div className="recheck-alert-title">{alertLabel} — run your packing weather check</div>
              <div className="recheck-alert-sub">Claude will compare the forecast for {trip.destination} against your list</div>
            </div>
            <div style={{fontSize:20,color:"rgba(91,164,255,.5)"}}>›</div>
          </div>
        )}

        {/* No destination */}
        {!trip.destination && recheck.step==="idle" && (
          <div style={{fontSize:12,color:"var(--text-dim)"}}>Add a destination in the Plan tab to enable weather re-check.</div>
        )}

        {/* Idle with destination, no alert */}
        {trip.destination && recheck.step==="idle" && !showAlert && (
          <div style={{fontSize:12,color:"var(--text-dim)"}}>
            Check your packing list against the {trip.destination} forecast any time.
          </div>
        )}

        {/* Loading shimmer */}
        {(recheck.step==="fetching"||recheck.step==="analyzing")&&(
          <div className="recheck-loading">
            <div className="recheck-shimmer" style={{height:60}}/>
            <div className="recheck-shimmer" style={{height:80,opacity:.7}}/>
            <div className="recheck-shimmer" style={{height:50,opacity:.4}}/>
          </div>
        )}

        {/* Error */}
        {recheck.step==="error"&&(
          <div className="ocr-error" style={{marginTop:8}}>⚠️ {recheck.error}</div>
        )}

        {/* Results */}
        {recheck.step==="ready"&&recheck.result&&(
          <div style={{animation:"fadeUp .3s ease"}}>

            {/* Weather summary */}
            <div className="weather-summary-box">🌡️ {recheck.result.weather_summary}</div>

            {/* Forecast mini-strip */}
            {recheck.forecast&&(
              <div className="forecast-strip">
                {recheck.forecast.map((day,i)=>(
                  <div key={day.date} className={`forecast-day${i===0?" today":""}`}>
                    <div className="forecast-day-label">
                      {i===0?"Today":new Date(day.date+"T12:00").toLocaleDateString("en",{weekday:"short"})}
                    </div>
                    <div className="forecast-day-icon">{day.icon}</div>
                    <div className="forecast-day-temp">{day.maxT}°</div>
                    <div className="forecast-day-rain">{day.rainPct>0?`${day.rainPct}%`:""}</div>
                  </div>
                ))}
              </div>
            )}

            {/* Gaps */}
            {recheck.result.gaps?.length>0&&(
              <div className="recheck-section">
                <div className="recheck-section-hdr" style={{color:"#FF5C5C"}}>
                  <span>🚨</span> {recheck.result.gaps.length} gap{recheck.result.gaps.length!==1?"s":""} — consider adding
                </div>
                {recheck.result.gaps.map((g,i)=>(
                  <div key={i} className="recheck-item recheck-item-gap">
                    <div className="recheck-item-icon">➕</div>
                    <div className="recheck-item-body">
                      <div className="recheck-item-name">{g.item}</div>
                      <div className="recheck-item-reason">{g.reason}</div>
                    </div>
                    <button
                      className={`recheck-add-btn${rcAdded[g.item]?" added":""}`}
                      onClick={()=>!rcAdded[g.item]&&addGapItem(g.item,g.category)}>
                      {rcAdded[g.item]?"✓ Added":"+ Add"}
                    </button>
                  </div>
                ))}
              </div>
            )}

            {/* Overkill */}
            {recheck.result.overkill?.length>0&&(
              <div className="recheck-section">
                <div className="recheck-section-hdr" style={{color:"var(--text-dim)"}}>
                  <span>🤔</span> May not need
                </div>
                {recheck.result.overkill.map((o,i)=>(
                  <div key={i} className="recheck-item recheck-item-overkill">
                    <div className="recheck-item-icon">📦</div>
                    <div className="recheck-item-body">
                      <div className="recheck-item-name" style={{textDecoration:"line-through",color:"var(--text-dim)"}}>{o.item}</div>
                      <div className="recheck-item-reason">{o.reason}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Confirmed */}
            {recheck.result.confirmed?.length>0&&(
              <div className="recheck-section">
                <div className="recheck-section-hdr" style={{color:"#4DB87A"}}>
                  <span>✅</span> Already covered
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                  {recheck.result.confirmed.map((c,i)=>(
                    <div key={i} className="recheck-item recheck-item-ok"
                      style={{padding:"5px 11px",marginBottom:0,display:"inline-flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:13}}>✓</span>
                      <span style={{fontSize:12,color:"#4DB87A",fontWeight:500}}>{c}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Add-all gaps shortcut */}
            {recheck.result.gaps?.filter(g=>!rcAdded[g.item]).length>1&&(
              <button className="btn-ghost" style={{width:"100%",marginTop:4,borderColor:"rgba(255,92,92,0.3)",color:"#FF5C5C"}}
                onClick={()=>recheck.result.gaps.filter(g=>!rcAdded[g.item]).forEach(g=>addGapItem(g.item,g.category))}>
                + Add all {recheck.result.gaps.filter(g=>!rcAdded[g.item]).length} missing items
              </button>
            )}
          </div>
        )}

        {/* Dismiss auto-alert */}
        {showAlert&&recheck.step==="idle"&&(
          <div style={{textAlign:"right",marginTop:8}}>
            <button className="btn-del" style={{fontSize:11,color:"var(--text-dim)"}} onClick={dismissAlert}>
              Dismiss
            </button>
          </div>
        )}
      </div>

      {/* ── Smart Pack Card ── */}
      <div className="smart-pack-card">
        <div className="flex items-center justify-between" style={{marginBottom:10}}>
          <div className="card-title" style={{marginBottom:0,fontSize:14}}>✨ AI Smart Packing</div>
          <button className="btn-ghost" style={{fontSize:11,padding:"4px 10px"}}
            onClick={()=>setShowPanel(p=>!p)}>
            {showPanel?"▲ Hide":"▼ Customise"}
          </button>
        </div>

        {/* Context tags — always visible */}
        <div style={{marginBottom:8}}>
          {trip.destination && <span className="context-tag">📍 {trip.destination}</span>}
          {trip.startDate && trip.endDate && (()=>{
            const d=Math.round((new Date(trip.endDate)-new Date(trip.startDate))/86400000)+1;
            return <span className="context-tag">🗓️ {d} days</span>;
          })()}
          {itinerary.flatMap(d=>d.activities).length > 0 &&
            <span className="context-tag">📅 {itinerary.flatMap(d=>d.activities).length} activities</span>}
          {occasions.map(id=><span key={id} className="context-tag" style={{color:"var(--amber)",borderColor:"rgba(255,168,40,0.2)"}}>{OCCASIONS.find(o=>o.id===id)?.label}</span>)}
        </div>

        {/* Expandable panel */}
        {showPanel && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div className="card-title-small" style={{marginTop:8}}>Trip type / occasion</div>
            <div className="occasion-chips">
              {OCCASIONS.map(o=>(
                <div key={o.id} className={`occ-chip${occasions.includes(o.id)?" on":""}`}
                  onClick={()=>toggleOccasion(o.id)}>{o.label}</div>
              ))}
            </div>
            <div className="card-title-small" style={{marginTop:12}}>Extra context</div>
            <textarea className="input" style={{minHeight:56,fontSize:12,lineHeight:1.5}}
              placeholder="e.g. monsoon season · vegetarian · attending a wedding · cold hotel rooms · travelling with a toddler…"
              value={extraNotes} onChange={e=>setExtraNotes(e.target.value)} />
          </div>
        )}

        <button className="btn btn-full mt-10" onClick={generateSuggestions}
          disabled={loadingSuggest||(!trip.destination&&occasions.length===0&&!extraNotes.trim())}>
          {loadingSuggest
            ? <span className="dots"><span>·</span><span>·</span><span>·</span></span>
            : "✨ Generate Smart Suggestions"}
        </button>
        {!trip.destination && occasions.length===0 && !extraNotes.trim() && (
          <div style={{textAlign:"center",fontSize:11,color:"rgba(230,217,194,0.3)",marginTop:6}}>
            Add a destination in Plan tab or pick an occasion above to get started
          </div>
        )}

        {/* Loading shimmer */}
        {loadingSuggest && (
          <div className="suggest-panel">
            <div className="loading-shimmer" />
            <div className="loading-shimmer" style={{height:60,opacity:0.6}} />
            <div className="loading-shimmer" style={{height:45,opacity:0.35}} />
          </div>
        )}

        {/* Suggestions results */}
        {suggestions && !loadingSuggest && (
          <div className="suggest-panel">
            {contextSummary && <div className="suggest-context-summary">💡 {contextSummary}</div>}

            {suggestions.length > 0 && (
              <div className="add-all-row">
                <span style={{fontSize:12,color:"var(--text-dim)"}}>
                  {newCount > 0 ? `${newCount} new item${newCount!==1?"s":""} to add` : "All items already in your list!"}
                </span>
                {newCount > 0 && (
                  <button className="btn btn-sm" onClick={handleAddAll}>+ Add all new</button>
                )}
              </div>
            )}

            {suggestions.length === 0 && (
              <div className="empty" style={{padding:"16px 0 0"}}>
                <div className="empty-msg">No suggestions returned. Try adding more trip details.</div>
              </div>
            )}

            {suggestions.map((group, gi) => (
              <div key={gi} className="suggest-group">
                <div className="suggest-group-hdr">
                  <div className="suggest-group-title">{group.category}</div>
                </div>
                {group.reason && <div className="suggest-reason">{group.reason}</div>}
                <div className="suggest-items">
                  {group.items.map((item, ii) => {
                    const alreadyIn = existingNames.has(item.toLowerCase());
                    const justAdded = addedItems[item];
                    const done = alreadyIn || justAdded;
                    return (
                      <div key={ii}
                        className={`suggest-chip${done?" added":""}`}
                        onClick={()=>!done&&handleAddChip(item, group.category)}
                        title={alreadyIn?"Already in your list":justAdded?"Added!":"Tap to add"}>
                        <span className="chip-icon">{done?"✓":"+"}</span>
                        <span>{item}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Existing packing categories */}
      {Object.entries(packing).map(([cat,items])=>{
        const catDone = items.filter(i=>i.checked).length;
        const isCol = collapsed[cat];
        return (
          <div key={cat} className="card" style={{padding:"14px 16px"}}>
            <div className="flex items-center justify-between" style={{cursor:"pointer",marginBottom:isCol?0:10}}
              onClick={()=>setCollapsed(p=>({...p,[cat]:!p[cat]}))}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:15,fontFamily:"'Playfair Display',serif",color:"var(--amber)"}}>{cat}</span>
                <span style={{fontSize:11,color:"rgba(230,217,194,0.35)"}}>{catDone}/{items.length}</span>
              </div>
              <span style={{color:"rgba(230,217,194,0.3)",fontSize:11}}>{isCol?"▼":"▲"}</span>
            </div>
            {!isCol && (<>
              {items.map(item=>(
                <div key={item.id} className="check-item" onClick={()=>togglePacking(cat,item.id)}>
                  <div className={`check-box${item.checked?" on":""}`} />
                  <span className={`check-text${item.checked?" done":""}`}>{item.name}</span>
                </div>
              ))}
              <div className="flex gap-8 mt-8">
                <input className="input flex-1" style={{padding:"7px 11px",fontSize:12}} placeholder="Add item…"
                  value={newItems[cat]||""} onChange={e=>setNewItems(p=>({...p,[cat]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&handleAdd(cat)} />
                <button className="btn-ghost" onClick={()=>handleAdd(cat)}>Add</button>
              </div>
            </>)}
          </div>
        );
      })}
    </div>
  );
}

/* ── SHARE MODAL ──────────────────────────────────────────────────────────── */
const JSONBLOB = "https://jsonblob.com/api/jsonBlob";

function ShareModal({ onClose, trip, itinerary, packing, expenses, people, baseCurrency, totalBudget, memories, saveTrip, saveItinerary, savePacking, saveExpenses, savePeople, saveBudget, saveBaseCurrency, initialCode="" }) {
  const [activeTab, setActiveTab] = useState(initialCode ? "join" : "share");
  const [includes, setIncludes]   = useState({ itinerary:true, packing:true, budget:true, memories:false });
  const [shareState, setShareState] = useState({ step:"idle", code:"", error:"" }); // idle | creating | ready | updating | error
  const [joinCode,   setJoinCode]   = useState(initialCode);
  const [joinState,  setJoinState]  = useState({ step:"idle", preview:null, error:"", blobId:"" }); // idle | fetching | preview | importing | done | error
  const [joinName,   setJoinName]   = useState("");
  const [joinIncludes, setJoinIncludes] = useState({ itinerary:true, packing:true, budget:false });
  const [copiedMsg,  setCopiedMsg]  = useState("");

  const toggleInclude = (k) => setIncludes(p=>({...p,[k]:!p[k]}));
  const toggleJoinInclude = (k) => setJoinIncludes(p=>({...p,[k]:!p[k]}));

  // ── Build shareable payload ──────────────────────────────────────────────
  const buildPayload = () => {
    const payload = {
      v: 2,
      createdAt: new Date().toISOString(),
      trip, people, baseCurrency, totalBudget,
    };
    if (includes.itinerary) payload.itinerary = itinerary;
    if (includes.packing)   payload.packing   = packing;
    if (includes.budget)    payload.expenses  = expenses;
    if (includes.memories)  payload.memories  = memories.map(m=>({...m, photo:null})); // strip photos
    return payload;
  };

  // ── Create link ──────────────────────────────────────────────────────────
  const createLink = async () => {
    setShareState({ step:"creating", code:"", error:"" });
    try {
      const res = await fetch(JSONBLOB, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(buildPayload()),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      // JSONBlob returns the blob ID in the Location header OR response URL
      const location = res.headers.get("X-id") || res.headers.get("Location") || res.url || "";
      const blobId = location.replace(/.*\//, "").trim();
      if (!blobId) throw new Error("No blob ID returned");
      LS.set("tc_share_blobid", blobId);
      setShareState({ step:"ready", code:blobId, blobId, error:"" });
    } catch(e) {
      setShareState({ step:"error", code:"", error:"Could not create link — " + e.message });
    }
  };

  // ── Push update ──────────────────────────────────────────────────────────
  const pushUpdate = async () => {
    const blobId = shareState.blobId || LS.get("tc_share_blobid","");
    if (!blobId) return;
    setShareState(p=>({...p, step:"updating"}));
    try {
      await fetch(`${JSONBLOB}/${blobId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(buildPayload()),
      });
      setShareState(p=>({...p, step:"ready"}));
      flash("✓ Updated!");
    } catch { setShareState(p=>({...p, step:"ready"})); flash("⚠️ Update failed"); }
  };

  // ── Restore existing link on open ────────────────────────────────────────
  useEffect(()=>{
    const savedBlobId = LS.get("tc_share_blobid","");
    if (savedBlobId && activeTab==="share") {
      setShareState({ step:"ready", code:savedBlobId, blobId:savedBlobId, error:"" });
    }
  }, [activeTab]);

  // ── Auto-fetch if initialCode given ─────────────────────────────────────
  useEffect(()=>{
    if (initialCode) { setJoinCode(initialCode); fetchPreview(initialCode); }
  },[]);

  // ── Fetch preview ────────────────────────────────────────────────────────
  const fetchPreview = async (rawCode) => {
    let input = (rawCode||joinCode).trim();
    if (!input) return;
    // If user pasted a full URL, extract the ?trip= param or the last path segment
    try {
      const u = new URL(input);
      input = u.searchParams.get("trip") || u.pathname.replace(/.*\//, "") || input;
    } catch {}
    // Strip any trailing slashes or whitespace
    input = input.replace(/\/+$/, "").trim();
    if (!input) return;
    setJoinState({ step:"fetching", preview:null, error:"", blobId:"" });
    try {
      const res = await fetch(`${JSONBLOB}/${input}`, {
        headers: { "Accept": "application/json" },
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data || !data.trip) throw new Error("Invalid trip data");
      setJoinState({ step:"preview", preview:data, error:"", blobId:input });
    } catch(e) {
      setJoinState({ step:"error", preview:null, error:`Trip not found (${e.message}). Paste the full link or ID shared by the trip creator.`, blobId:"" });
    }
  };

  // ── Import ────────────────────────────────────────────────────────────────
  const importTrip = () => {
    const d = joinState.preview;
    if (!d) return;
    setJoinState(p=>({...p, step:"importing"}));
    // Always import trip basics
    if (d.trip) saveTrip(d.trip);
    if (d.baseCurrency) saveBaseCurrency(d.baseCurrency);
    if (d.totalBudget)  saveBudget(d.totalBudget);
    // Merge people: add joining user, skip duplicates
    const existingNames = new Set(people.map(p=>p.name));
    const incoming = (d.people||[]).filter(p=>!existingNames.has(p.name));
    const myEntry = joinName.trim() && !existingNames.has(joinName.trim()) ? [{id:Date.now()+1, name:joinName.trim()}] : [];
    savePeople([...people, ...incoming, ...myEntry]);
    // Optional sections
    if (joinIncludes.itinerary && d.itinerary) saveItinerary(d.itinerary);
    if (joinIncludes.packing   && d.packing)   savePacking(d.packing);
    if (joinIncludes.budget    && d.expenses)   saveExpenses(d.expenses);
    setJoinState(p=>({...p, step:"done"}));
  };

  // ── Share helpers ─────────────────────────────────────────────────────────
  const tripUrl = () => `${window.location.origin}${window.location.pathname}?trip=${joinState.blobId||shareState.blobId}`;
  const qrUrl   = (code) => `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(code)}&bgcolor=07101F&color=FFA828&margin=10`;

  const flash = (msg) => { setCopiedMsg(msg); setTimeout(()=>setCopiedMsg(""), 2000); };

  const copyCode = () => { navigator.clipboard?.writeText(shareState.code).then(()=>flash("✓ Code copied!")).catch(()=>{}); };
  const copyLink = () => { navigator.clipboard?.writeText(tripUrl()).then(()=>flash("✓ Link copied!")).catch(()=>{}); };
  const nativeShare = () => {
    if (!navigator.share) { copyLink(); return; }
    navigator.share({ title: `Join ${trip.name||"my trip"}!`, text:`Join my TravelPal trip${trip.destination?" to "+trip.destination:""}! Use code: ${shareState.code}`, url: tripUrl() }).catch(()=>{});
  };

  const SECTIONS = [
    { key:"itinerary", icon:"📅", label:"Itinerary", sub:`${itinerary.length} days` },
    { key:"packing",   icon:"🧳", label:"Packing list", sub:`${Object.values(packing).flat().length} items` },
    { key:"budget",    icon:"💰", label:"Budget & expenses", sub:`${expenses.length} expenses` },
    { key:"memories",  icon:"📸", label:"Memory pins", sub:`${memories.length} memories (no photos)` },
  ];

  return (
    <>
      <div className="share-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="share-sheet">
          <div className="share-header">
            <div className="share-header-top">
              <div className="share-title">✈️ Share &amp; Invite</div>
              <button className="btn-del" style={{fontSize:22}} onClick={onClose}>✕</button>
            </div>
            <div className="share-tabs">

              <button className={`share-tab-btn${activeTab==="join"?" active":""}`}  onClick={()=>setActiveTab("join")}>📥 Join a Trip</button>

            {/* ── SHARE TAB ── */}
            {activeTab==="share"&&(
              <div>
                <div style={{fontSize:13,color:"var(--text-dim)",marginBottom:14,lineHeight:1.6}}>
                  Create a shareable trip code. Anyone with the code can view and import your trip data.
                </div>

                {/* What to include */}
                <div className="card-title-small">What to share</div>
                {SECTIONS.map(s=>(
                  <div key={s.key} className="include-row" onClick={()=>toggleInclude(s.key)}>
                    <div className={`include-check${includes[s.key]?" on":""}`}/>
                    <span style={{fontSize:16}}>{s.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:500}}>{s.label}</div>
                      <div style={{fontSize:11,color:"var(--text-dim)"}}>{s.sub}</div>
                    </div>
